nt-weight:700;\">Хозяин<br><span style=\"font-size:11px; color:#9A9488;\">собственник, ЛПР<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Говорит о результате и статусе, решает быстро<\/td><td style=\"padding:13px 18px; color:#33343B;\">Масштаб, ROI, конкурентное преимущество, «вы будете первым в районе».<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Скептик<br><span style=\"font-size:11px; color:#9A9488;\">обжёгся на подрядчиках<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Возражает заранее, ждёт подвоха<\/td><td style=\"padding:13px 18px; color:#33343B;\">Честность, гарантии, SLA, кейсы, «если невыгодно — скажем прямо».<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Технарь<br><span style=\"font-size:11px; color:#9A9488;\">гл. инженер<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Уходит в детали оборудования<\/td><td style=\"padding:13px 18px; color:#33343B;\">Говорите на его языке, но возвращайте к экономике для ЛПР.<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.2 — Квалификация лида (BANT + срочность)<\/h3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:20%;\">Параметр<\/th><th style=\"padding:13px 18px; font-weight:700;\">Что выясняем<\/th><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Сигнал «горячо»<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Бюджет<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Готовность к капексу или интерес к лизингу<\/td><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">«А есть рассрочка?» — берёт всерьёз<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Полномочия<\/td><td style=\"padding:13px 18px; color:#5E6066;\">ЛПР это или передаст наверх<\/td><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Сам принимает решение<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Потребность<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Острая боль или «просто интересуюсь»<\/td><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Называет конкретную проблему в деньгах<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Срочность<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Окно решения и его причина<\/td><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Стройка, рост тарифа, поломка генератора<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Вероятность<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Итоговая оценка 1–100%<\/td><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Сумма сигналов выше<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.3 — Шкала готовности<\/h3>\n      <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;\">\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #E7E2D7;\"><div style=\"background:#B8412F; color:#fff; padding:14px 18px;\"><div style=\"font-weight:800; font-size:16px;\">Горячий<\/div><div style=\"font-size:24px; font-weight:800;\">70–100%<\/div><\/div><div style=\"padding:16px 18px;\"><p style=\"margin:0 0 10px; font-size:13px; color:#5E6066;\">Есть боль в деньгах, бюджет/интерес к лизингу, ЛПР на связи, окно решения близко.<\/p><div style=\"font-weight:700; font-size:13px; color:#B8412F;\">→ Немедленно расчёт + встреча<\/div><\/div><\/div>\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #E7E2D7;\"><div style=\"background:#E08A1E; color:#fff; padding:14px 18px;\"><div style=\"font-weight:800; font-size:16px;\">Тёплый<\/div><div style=\"font-size:24px; font-weight:800;\">40–69%<\/div><\/div><div style=\"padding:16px 18px;\"><p style=\"margin:0 0 10px; font-size:13px; color:#5E6066;\">Боль есть, но решение отложено или нужен ещё один участник.<\/p><div style=\"font-weight:700; font-size:13px; color:#D87D08;\">→ Расчёт + дата следующего касания<\/div><\/div><\/div>\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #E7E2D7;\"><div style=\"background:#5754A0; color:#fff; padding:14px 18px;\"><div style=\"font-weight:800; font-size:16px;\">Холодный<\/div><div style=\"font-size:24px; font-weight:800;\">1–39%<\/div><\/div><div style=\"padding:16px 18px;\"><p style=\"margin:0 0 10px; font-size:13px; color:#5E6066;\">«Просто интересуюсь», нет срочности.<\/p><div style=\"font-weight:700; font-size:13px; color:#5754A0;\">→ Полезный контент + догрев, без давления<\/div><\/div><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART VII ============ -->\n    <section id=\"p7\" class=\"bleed page-break keep\" data-screen-label=\"Часть VII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">VII<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть седьмая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Презентация: от проблемы к выгоде<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Главная ошибка 90% продавцов — презентовать характеристики. «Панели Trina 580 Вт, инвертор Growatt» клиенту не говорит ничего. Мы строим презентацию по цепочке, где каждый аргумент привязан к боли, которую клиент уже сам назвал на этапе SPIN.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:16px;\">7.1 — Схема пяти шагов<\/h3>\n      <div class=\"keep\" style=\"display:flex; gap:8px; align-items:stretch; flex-wrap:wrap; margin-bottom:18px;\">\n        <div style=\"flex:1; min-width:120px; background:#FBEEEB; border-radius:10px; padding:16px; text-align:center;\"><div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">1<\/div><div style=\"font-weight:800; margin-top:4px;\">Проблема<\/div><\/div>\n        <div style=\"display:flex; align-items:center; color:#C9C4B8; font-weight:800;\">→<\/div>\n        <div style=\"flex:1; min-width:120px; background:#F6F3EC; border-radius:10px; padding:16px; text-align:center;\"><div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#9A9488; font-weight:800;\">2<\/div><div style=\"font-weight:800; margin-top:4px;\">Решение<\/div><\/div>\n        <div style=\"display:flex; align-items:center; color:#C9C4B8; font-weight:800;\">→<\/div>\n        <div style=\"flex:1; min-width:120px; background:#FBF4E9; border-radius:10px; padding:16px; text-align:center;\"><div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#D87D08; font-weight:800;\">3<\/div><div style=\"font-weight:800; margin-top:4px;\">Выгода<\/div><\/div>\n        <div style=\"display:flex; align-items:center; color:#C9C4B8; font-weight:800;\">→<\/div>\n        <div style=\"flex:1; min-width:120px; background:#E5EFE9; border-radius:10px; padding:16px; text-align:center;\"><div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#2E8059; font-weight:800;\">4<\/div><div style=\"font-weight:800; margin-top:4px;\">Финэффект<\/div><\/div>\n        <div style=\"display:flex; align-items:center; color:#C9C4B8; font-weight:800;\">→<\/div>\n        <div style=\"flex:1; min-width:120px; background:#EFE9F3; border-radius:10px; padding:16px; text-align:center;\"><div style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#6A5AA0; font-weight:800;\">5<\/div><div style=\"font-weight:800; margin-top:4px;\">Эмоция<\/div><\/div>\n      <\/div>\n      <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 24px; font-size:14.5px; line-height:1.6; color:#33343B;\">Не «у нас гибридная схема», а: «вы говорили, что зимой отключения останавливают котёл <i style=\"color:#B8412F;\">(проблема)<\/i>. Гибридная схема с накопителем <i style=\"color:#9A9488;\">(решение)<\/i> держит дом даже при отключении сети <i style=\"color:#D87D08;\">(выгода)<\/i>. Это убирает риск разморозки и аварийных трат <i style=\"color:#2E8059;\">(финансовый эффект)<\/i>. И вы перестаёте каждую зиму держать это в голове <i style=\"color:#6A5AA0;\">(эмоциональный эффект)<\/i>».<\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">7.2 — Связки «боль → выгода» по сегментам<\/h3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:16%;\">Сегмент<\/th><th style=\"padding:13px 18px; font-weight:700; width:30%;\">Боль клиента<\/th><th style=\"padding:13px 18px; font-weight:700;\">Презентация-связка<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:800; color:#D87D08;\">Коммерция<\/td><td style=\"padding:13px 18px; color:#5E6066; font-style:italic;\">«Прибыль есть, но некуда вложить с понятной отдачей»<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Крыша превращается в актив с доходностью 25–30% годовых — это лучше депозита, и каждый день гасит счёт за свет. NPV на 10 лет — плюс десятки миллионов.»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:800;\">Производство<\/td><td style=\"padding:13px 18px; color:#5E6066; font-style:italic;\">«Энергия в себестоимости не оптимизируется обычными методами»<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Собственная генерация даёт LCOE ниже сетевого тарифа на горизонте 15 лет. Системное снижение OPEX плюс готовый ESG-отчёт для материнской компании.»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:800;\">Агро<\/td><td style=\"padding:13px 18px; color:#5E6066; font-style:italic;\">«Летом счёт за полив в 3–5 раз выше зимнего»<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Солнце совпадает с пиком полива день в день. Себестоимость килограмма падает на N тенге — и так на 30 лет. Окупаемость 3–4 года.»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:800;\">B2C<\/td><td style=\"padding:13px 18px; color:#5E6066; font-style:italic;\">«Тарифы растут, зимой отключают свет»<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Стоимость электричества фиксируется на 25 лет, отключения сети вас больше не касаются. Дом начинает работать на вас, а не вы на ЭСО.»<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">7.3 — Финансирование: главный аргумент B2B<\/h3>\n      <p style=\"margin:0 0 18px; color:#33343B;\">Возражение №1 в B2B — «большой капекс на старте». Оно снимается одним ходом: лизинг превращает разовый капекс в ежемесячный платёж, который перекрывается экономией на электричестве с первого дня.<\/p>\n      <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:16px;\">\n        <div style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 20px;\"><div style=\"font-weight:800; color:#2A2660; margin-bottom:6px;\">Коммерция и производство<\/div><p style=\"margin:0; font-size:13px; color:#5E6066;\">Лизинг через BCC Leasing: от 5 млн до 10 млрд ₸, аванс от 15%, для производства ставка от 12,6%.<\/p><\/div>\n        <div style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 20px;\"><div style=\"font-weight:800; color:#2A2660; margin-bottom:6px;\">Агро<\/div><p style=\"margin:0; font-size:13px; color:#5E6066;\">Лизинг через КазАгроФинанс — без вывода оборотки в посевную.<\/p><\/div>\n        <div style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 20px;\"><div style=\"font-weight:800; color:#2A2660; margin-bottom:6px;\">Частники<\/div><p style=\"margin:0; font-size:13px; color:#5E6066;\">Рассрочка через банки-партнёры (BCC).<\/p><\/div>\n      <\/div>\n      <div style=\"background:linear-gradient(120deg,#2E2A66,#3A3680); color:#fff; border-radius:12px; padding:22px 26px;\"><div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:8px;\">Фраза-ключ<\/div><p style=\"margin:0; font-size:17px; line-height:1.45; font-weight:600;\">«Вам не нужно вынимать деньги из бизнеса. Станция платит за себя из той экономии, которую сама же и создаёт. По сути вы меняете растущий платёж энергосбыту на фиксированный платёж за собственный актив.»<\/p><\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">7.4 — Правило одной страницы<\/h3>\n      <div style=\"display:flex; gap:18px; align-items:flex-start; padding:20px 26px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\">\n        <div style=\"font-size:30px; font-weight:800; color:#D87D08; flex:none;\">3–4<\/div>\n        <p style=\"margin:0; color:#5A4A2C;\">Презентация в разговоре — это <b style=\"color:#3A3010;\">3–4 связки, не 15.<\/b> Перегруз аргументами размывает фокус. Выберите две-три самые острые боли и отработайте их до конца. Остальное — в письменный расчёт, который вы пришлёте.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART VIII ============ -->\n    <section id=\"p8\" class=\"bleed page-break keep\" data-screen-label=\"Часть VIII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">VIII<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть восьмая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Работа с возражениями<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Возражение — это не отказ, а запрос на информацию или признак невыясненной боли. Не спорьте: спор клиент проигрывать не станет — он просто уйдёт. 26 реальных возражений рынка РК, к каждому — психологическая причина, верный ответ и типичная ошибка.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 0;\">\n      <div class=\"keep mscroll\" style=\"display:flex; gap:14px; align-items:stretch; margin-bottom:8px;\">\n        <div style=\"flex:1; background:#FBF4E9; border-radius:11px; padding:18px 22px;\"><div style=\"font-size:22px; font-weight:800; color:#D87D08;\">1<\/div><div style=\"font-weight:700; margin-top:2px;\">Признать<\/div><p style=\"margin:4px 0 0; font-size:13px; color:#6A5A3E;\">«понимаю», «хороший вопрос» — снять оборону.<\/p><\/div>\n        <div style=\"flex:1; background:#FBF4E9; border-radius:11px; padding:18px 22px;\"><div style=\"font-size:22px; font-weight:800; color:#D87D08;\">2<\/div><div style=\"font-weight:700; margin-top:2px;\">Переформулировать<\/div><p style=\"margin:4px 0 0; font-size:13px; color:#6A5A3E;\">перевести в выгоду или факт.<\/p><\/div>\n        <div style=\"flex:1; background:#FBF4E9; border-radius:11px; padding:18px 22px;\"><div style=\"font-size:22px; font-weight:800; color:#D87D08;\">3<\/div><div style=\"font-weight:700; margin-top:2px;\">Вернуть вопрос<\/div><p style=\"margin:4px 0 0; font-size:13px; color:#6A5A3E;\">возвращающий разговор в нужное русло.<\/p><\/div>\n      <\/div>\n      <p style=\"margin:14px 0 0; font-size:13px; color:#9A9488; text-align:center;\">Универсальная формула ответа на любое возражение<\/p>\n    <\/section>\n\n    <!-- Category: Цена -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:40px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Цена и деньги<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 1–4<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">1<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Это слишком дорого»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> клиент сравнивает цену не с выгодой, а с нулём — видит расход, а не актив.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Понимаю. Давайте иначе: по вашему счёту станция окупается за 2–4 года, а работает 25 лет. Вы платите за электричество вперёд один раз — а потом 20+ лет пользуетесь почти бесплатно. Какой ваш счёт за прошлый месяц, посчитаем точно?<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Это не дорого» / «у всех так». Обесценивание возражения и спор о цене без цифр.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Показать сравнение «10 лет на тарифе vs 10 лет со станцией» в тенге.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">2<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«У нас нет таких денег / нет бюджета»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> реальный барьер — капекс на старте, а не сама целесообразность.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Деньги из бизнеса вынимать и не нужно. Берём в лизинг: аванс от 15%, а ежемесячный платёж перекрывается экономией с первого месяца. Для производства ставка от 12,6%. Прислать схему платежей под ваш объект?<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Тогда перезвоните, когда появятся». Потеря горячего лида из-за непредложенного финансирования.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Назвать конкретного лизингового партнёра и срок рассмотрения заявки.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">3<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Лучше вложу в развитие бизнеса»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> клиент воспринимает СЭС как замороженные деньги, а не как актив.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Это и есть вложение в бизнес — только с понятным ROI 25–30% и амортизацией. Станция каждый день снижает OPEX, то есть высвобождает деньги на то самое развитие. Это не вместо развития, а ресурс для него.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">Согласиться и отступить: «да, наверное, вы правы». Сдача позиции без аргумента.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">4<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Кредит сейчас невыгоден»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> клиент держит в голове дорогой банковский кредит, а не лизинг под энергопроекты.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Согласен, обычный кредит — дорого. Поэтому мы работаем через профильный лизинг: ставка ниже, а окупаемость станции (2–4 года) короче срока договора. Актив гасит платёж быстрее, чем вы его выплачиваете.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Ну да, ставки высокие». Подтверждение возражения без альтернативы.<\/p><\/div>\n    <\/div>\n\n    <!-- Category: Технологии -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:32px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Технологии и надёжность<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 5–8<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">5<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Зимой и в облачную погоду солнца нет»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> самый частый страх B2C и агро. За ним — непонимание, как работает гибрид и НЕТТО.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Справедливо, зимой выработка ниже. Поэтому схема гибридная и с НЕТТО-учётом: летом вы «копите» переработку в сеть, зимой — снимаете. По вашему региону покажу помесячную разбивку на реальном объекте — увидите, что годовой баланс закрывается.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Да нет, зимой тоже всё отлично работает». Завышение — клиент потом поймает на лжи.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Прислать график помесячной выработки по реализованному объекту в регионе клиента.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">6<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«А если оборудование сломается?»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> страх остаться один на один с дорогой поломкой.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Для этого есть гарантия и сервисный контракт: на панели — до 25 лет, на инвертор — отдельная гарантия, плюс регламентное обслуживание. Мы — единый подрядчик полного цикла, не пропадём после монтажа. SLA на реакцию прописываем в договоре.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Там ломаться нечему». Снимает ответственность и звучит несерьёзно.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Показать SLA-пункт в типовом договоре.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">7<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Степь, пыль, град — панели испортятся»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> реальный климатический риск юга РК и непонимание класса защиты оборудования.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Учитываем это в проекте: класс защиты IP67, сертификация IEC 61215, устойчивость к граду — заводские стандарты панелей. У нас есть объекты в южных регионах, отработавшие пыльные сезоны. Угол установки считаем под самоочистку.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Ничего им не будет». Игнорирование обоснованного опасения фермера.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Кейс работающего объекта в схожих климатических условиях.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">8<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Что если СЭС подведёт, а производство встанет?»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> для промышленности энергобезопасность важнее экономии.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Сеть остаётся вашим резервом — станция не заменяет её, а снижает зависимость и счёт. На критичных объектах добавляем накопители и резервирование. В договоре — SLA с гарантированной выработкой и неустойкой за недовыработку.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Она не подведёт, не переживайте». Обещание без гарантийного механизма.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Контракт с пенальти за недовыработку — сильнейший аргумент для техдиректора.<\/span><\/div>\n    <\/div>\n\n    <!-- Category: Сомнения -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:32px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Сомнения и недоверие<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 9–13<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">9<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Нам это неинтересно»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> защитная реакция на холодный контакт, ещё до понимания сути. Почти всегда автоматическая.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Понимаю, так сначала говорят почти все. Я и не предлагаю ничего покупать. Предлагаю просто посчитать цифры по вашему объекту — бесплатно. Если экономического смысла нет, я честно скажу. Что вы теряете, кроме пяти минут?<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Хорошо, до свидания» или, наоборот, напор. И то и другое — потеря.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">10<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Я пока просто интересуюсь / присматриваюсь»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> нет срочности, лид холодный, но дверь не закрыта.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Это абсолютно нормально — для того и нужен бесплатный расчёт. Вы получите реальные цифры по своему объекту и вернётесь к решению, когда будет удобно, уже с пониманием экономики. Давайте подготовлю — это ни к чему не обязывает.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">Давить на срочность, которой нет. Холодного клиента давление отпугивает.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">11<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Мне надо подумать»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> чаще всего за этим скрыто конкретное невысказанное сомнение — цена, доверие или нужен ещё один человек.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Конечно, такое решение не принимают на бегу. Подскажите, чтобы я подготовил нужное: какой именно вопрос хочется обдумать — цифры, сроки или с кем-то посоветоваться? Тогда я сразу дам материал под этот вопрос.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Хорошо, я перезвоню через недельку». Лид остывает и теряется.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Договориться о конкретной дате следующего контакта тут же.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">12<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Не уверен в подрядчике / был плохой опыт»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> клиент обжёгся: кто-то наобещал и пропал.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Понимаю вас, на рынке таких историй хватает. Поэтому мы работаем как единый подрядчик полного цикла с гарантией и сервисным контрактом, а не «поставили и уехали». Дам портфолио, действующие гарантии и контакт клиента, которому можно позвонить напрямую.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Мы не такие, мы хорошие». Голословное заверение усиливает недоверие.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Референс-звонок действующему клиенту снимает недоверие лучше любых слов.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">13<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«У конкурентов дешевле»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> сравнение по цене — признак, что ценность ещё не показана.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Возможно. Только станция — это не разовая покупка, а 25 лет работы. Дешёвый монтаж со слабым оборудованием и без сервиса обходится дороже за счёт недовыработки и простоев. Давайте сравним не цену за установку, а стоимость киловатт-часа за 25 лет и гарантии — там картина другая.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«У них хуже / они обманут». Очернение конкурента роняет нас в глазах клиента.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Сравнительная таблица по LCOE и гарантийным обязательствам, без имён конкурентов.<\/span><\/div>\n    <\/div>\n\n    <!-- Category: Процесс -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:32px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Процесс и эксплуатация<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 14–18<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">14<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Сложно оформить, бумажная волокита»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> страх потратить недели на согласования с РЭК и сетями.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Эту часть мы берём полностью на себя: все согласования с энергосбытом и сетями, договор НЕТТО, документы — наша зона. Вы не ходите ни в один кабинет. От вас — только доступ к объекту и решение.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Там ничего сложного». Обесценивание реальной боли, клиент не верит.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">15<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«У нас аренда крыши / помещения»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> юридический барьер: клиент не собственник объекта.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Решаемо. Вариант первый — договор с собственником о разделе экономии. Вариант второй — станция демонтируемая и переносится на новый объект, это не привязка к стенам. Давайте посмотрим ваш договор аренды и подберём схему.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Тогда ничего не выйдет». Преждевременный отказ от сделки.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">16<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Что если мы переедем / перестроимся?»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> страх потерять вложение при изменении планов.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Станция демонтируется и переносится — это движимый актив. Более того, на момент продажи объекта она повышает его капитализацию: покупатель получает готовую энергонезависимость. Так что это не риск, а плюс к стоимости недвижимости.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Вы же не собираетесь переезжать». Спор с гипотезой клиента.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">17<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«У меня сейчас и так дел много, не до этого»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> не возражение по сути, а вопрос приоритета и нагрузки.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Именно поэтому весь процесс — на нас: аудит, проект, документы, монтаж в межсезонье без остановки работы. От вас нужно полчаса на старте и решение по цифрам. Дальше вы занимаетесь бизнесом, а станция — экономией.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Это быстро, не переживайте». Не отвечает на настоящую причину — занятость.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">18<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Сейчас не сезон / неподходящий момент»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> откладывание. Часто — мягкая форма «мне надо подумать».<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Как раз наоборот: расчёт и проект делаются заранее, а монтаж мы подгадываем под удобное окно — межсезонье, ночные смены, этапы без остановки работы. Если начать сейчас, к нужному моменту станция уже зарабатывает. Каждый месяц ожидания — упущенная экономия.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Ок, наберу в сезон». Лид теряется на месяцы.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Расчёт упущенной экономии за период ожидания — в тенге.<\/span><\/div>\n    <\/div>\n\n    <!-- Category: Стратегические -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:32px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Стратегические · B2B и промышленность<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 19–22<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">19<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Никто из конкурентов так не делает»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> страх быть первым, желание дождаться, пока «протопчут дорогу».<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">В мире так делают давно — Coca-Cola, IKEA, крупные заводы переходят на собственную генерацию ради экономики и ESG. В Казахстане окно как раз открыто: вы будете среди первых в отрасли, кто зафиксировал себестоимость энергии. Это конкурентное преимущество, а не риск.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Ну, кто-то же должен быть первым». Звучит как уговор стать подопытным.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">20<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Нужно согласование совета директоров»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> сложный DMU из 4–7 человек, длинный цикл.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Понимаю, решение коллегиальное. Поэтому мы готовим ТЭО уровня инвестбанка — с IRR, NPV, чувствительностью и рисками — документ, который защищается перед советом сам. Можем начать с пилота на одной площадке, чтобы решение было проще принять. С кого в команде правильно начать?<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">Давить на одного человека, игнорируя структуру принятия решения.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Предложить пилотный этап — снижает порог входа для совета.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">21<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«У нас стандарты материнской компании по подрядчикам»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> формальное требование к сертификации и комплаенсу.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Это не проблема: у нас есть ISO 9001, 14001 и 50001, проходим тендерные и аудиторские процедуры. Пришлю пакет сертификатов и опыт прохождения подобных проверок — посмотрите, всё ли закрывает ваши требования.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Разберёмся по ходу». Несерьёзный ответ для комплаенса.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">22<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Нам нужна ESG-отчётность, а вы просто монтажники»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> сомнение в экспертизе за пределами «поставить панели».<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Мы готовим документы под Scope 2 и углеродный след, помогаем с отчётностью для банков и партнёров из ЕС. Для вашей отрасли это часть проекта, а не допуслуга. Покажу пример пакета ESG-документов по похожему объекту.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Да, мы и это умеем». Без доказательства — пустое заявление.<\/p><\/div>\n    <\/div>\n\n    <!-- Category: Отсрочка -->\n    <div class=\"keep\" style=\"display:flex; align-items:center; gap:14px; margin:32px 0 18px;\"><span style=\"background:#2A2660; color:#fff; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; padding:8px 16px; border-radius:8px;\">Отсрочка и уход<\/span><span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span><span style=\"font-size:13px; color:#9A9488; font-weight:700;\">№ 23–26<\/span><\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">23<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Пришлите всё на почту, я посмотрю»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> вежливый способ закончить разговор. В 80% случаев письмо не открывают.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Обязательно пришлю. Чтобы это был не общий буклет, а расчёт по вашему объекту, мне нужны две цифры — ваш счёт и площадь крыши. Дадите сейчас? И давайте сразу наметим 15 минут на следующей неделе, чтобы я по цифрам ответил на вопросы, а не вы разбирались в письме сами.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Хорошо, отправлю». Письмо уходит в пустоту, контакт обрывается.<\/p><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">24<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Перезвоните позже / через полгода»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> откладывание без конкретики — лид рискует потеряться.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Хорошо. Чтобы не потерять время впустую, давайте я подготовлю расчёт сейчас — он не устареет, тарифы только растут. А созвонимся в конкретную дату: вам удобнее в начале или в конце месяца? Поставлю напоминание и пришлю пару полезных материалов до этого.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Ок, наберу как-нибудь». Без даты — значит никогда.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">Зафиксировать дату и причину следующего касания в CRM сразу.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">25<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Лучше подождать, оборудование подешевеет»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> логика «куплю позже дешевле». На деле тарифы растут быстрее, чем падает оборудование.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Цены на оборудование уже почти на дне, а тарифы растут каждый год — для юрлиц это десятки тенге за киловатт. За год ожидания вы переплатите энергосбыту больше, чем сэкономите на удешевлении станции. Давайте посчитаю цену ожидания конкретно по вашему счёту.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">«Может, и правда подешевеет». Подтверждение ложной логики клиента.<\/p><\/div>\n      <div style=\"display:flex; gap:10px; align-items:baseline; font-size:13px;\"><span style=\"font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#D87D08; font-weight:800; flex:none;\">Усилитель<\/span><span style=\"color:#6A5A3E;\">График: рост тарифа vs снижение цены оборудования за последние годы.<\/span><\/div>\n    <\/div>\n\n    <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; padding:24px 26px; margin-bottom:14px;\">\n      <div style=\"display:flex; align-items:flex-start; gap:16px; margin-bottom:14px;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center;\">26<\/span><h4 style=\"font-size:18px; font-weight:800; margin:3px 0 0;\">«Мне сейчас некогда говорить»<\/h4><\/div>\n      <p style=\"margin:0 0 14px; font-size:13.5px; color:#8A857B;\"><b style=\"color:#5E6066;\">Причина:<\/b> может быть правдой, а может — мягким отказом.<\/p>\n      <div style=\"background:#EEF6F1; border-radius:10px; padding:15px 18px; margin-bottom:10px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#1B7A4F; font-weight:800;\">Правильно<\/span><\/div><p style=\"margin:0; color:#27402F;\">Понял, не вовремя. Я займу буквально 30 секунд: скажите, когда вам перезвонить — сегодня вечером или завтра утром? Подготовлю к звонку расчёт по вашему объекту, чтобы не тратить ваше время на общие слова.<\/p><\/div>\n      <div style=\"background:#FBEEEB; border-radius:10px; padding:15px 18px;\"><div style=\"display:flex; gap:8px; align-items:center; margin-bottom:6px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B8412F; font-weight:800;\">Ошибка<\/span><\/div><p style=\"margin:0; color:#5E3B34;\">Продолжать говорить, не уважая «некогда». Гарантированный негатив.<\/p><\/div>\n    <\/div>\n\n    <!-- ============ PART IX ============ -->\n    <section id=\"p9\" class=\"bleed page-break keep\" data-screen-label=\"Часть IX\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">IX<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть девятая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Методы убеждения<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Только этичные приёмы. Манипуляция даёт одну сделку и испорченную репутацию; честное убеждение — сделку и рекомендацию. Каждый приём опирается на реальную ценность продукта, а не на психологический фокус.<\/p>\n    <\/section>\n\n    <section class=\"mcol-1\" style=\"padding:42px 0 36px; display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.1<\/span><div style=\"font-weight:800; font-size:16px;\">Социальное доказательство<\/div><\/div><p style=\"margin:0 0 10px; font-size:14px; color:#33343B;\">Люди смотрят на похожих на себя. Аграрию — кейс соседнего хозяйства, бизнесу — из его отрасли, частнику — сосед по посёлку.<\/p><div style=\"background:#F6F3EC; border-radius:8px; padding:12px 14px; font-size:13px; font-style:italic; color:#5E6066;\">«Хозяйство в Туркестанской области, 200 м², 100 кВт — экономят около 8 млн в год. Ситуация похожа на вашу, покажу цифры.»<\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.2<\/span><div style=\"font-weight:800; font-size:16px;\">Принцип потерь<\/div><\/div><p style=\"margin:0 0 10px; font-size:14px; color:#33343B;\">Страх потерять сильнее радости приобрести. «Вы теряете N тенге каждый месяц ожидания» работает мощнее, чем «вы сэкономите N».<\/p><div style=\"background:#F6F3EC; border-radius:8px; padding:12px 14px; font-size:13px; font-style:italic; color:#5E6066;\">«Пока решение откладывается, счётчик капает: при вашем счёте это около [сумма] в месяц мимо кассы. За год — [сумма].»<\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.3<\/span><div style=\"font-weight:800; font-size:16px;\">Якорение<\/div><\/div><p style=\"margin:0 0 10px; font-size:14px; color:#33343B;\">Первая цифра задаёт рамку. Сначала называем стоимость электричества за 25 лет на тарифе — на её фоне станция выглядит скромно.<\/p><div style=\"background:#F6F3EC; border-radius:8px; padding:12px 14px; font-size:13px; font-style:italic; color:#5E6066;\">«За 25 лет при текущем тарифе вы отдадите энергосбыту порядка [крупная сумма]. Станция стоит в разы меньше.»<\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.4<\/span><div style=\"font-weight:800; font-size:16px;\">Контраст<\/div><\/div><p style=\"margin:0; font-size:14px; color:#33343B;\">Решение выглядит выгоднее рядом с альтернативой. СЭС против депозита: депозит 14% годовых против «вечных» 25–30% через экономию. Дизель против солнца для агро.<\/p><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.5<\/span><div style=\"font-weight:800; font-size:16px;\">Эффект владения<\/div><\/div><p style=\"margin:0; font-size:14px; color:#33343B;\">Когда клиент мысленно уже «владеет» станцией, отказаться труднее. Говорим в настоящем времени: «ваша станция будет давать…», «когда вы зафиксируете тариф…».<\/p><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.6<\/span><div style=\"font-weight:800; font-size:16px;\">Дефицит (только честный)<\/div><\/div><p style=\"margin:0; font-size:14px; color:#33343B;\">Реальные ограничения дают повод действовать: окно НЕТТО-законодательства,
