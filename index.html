document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

oc { max-width: none !important; margin: 0 !important; box-shadow: none !important; }\n    \u002F* Cover fills exactly one page edge-to-edge. *\u002F\n    #cover { page: cover; min-height: 296mm !important; }\n    \u002F* Keep headings attached to the content that follows them. *\u002F\n    h2, h3, h4 { break-after: avoid; }\n    \u002F* Never split these blocks across a page. *\u002F\n    figure, blockquote, img, tr, .keep { break-inside: avoid; }\n    \u002F* Big content sections may flow across pages; their inner .keep blocks stay intact. *\u002F\n    .flow { break-inside: auto; }\n    p, li { orphans: 3; widows: 3; }\n    .screen-only { display: none !important; }\n    \u002F* Every chapter \u002F topic starts on a fresh page. *\u002F\n    .page-break { break-before: page; }\n  }\n  @media (max-width: 800px) { :root { --pad: 24px; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<main class=\"doc\">\n\n    <!-- ============ COVER ============ -->\n    <section id=\"cover\" class=\"bleed\" data-screen-label=\"Обложка\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(150deg,#2E2A66 0%,#231F52 55%,#1C1944 100%); color:#fff; min-height:1040px; display:flex; flex-direction:column;\">\n      <div style=\"height:12px; background:linear-gradient(90deg,#F7941D,#FBB040);\"><\u002Fdiv>\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-220px; top:-160px; width:620px; height:620px; border-radius:50%; background:radial-gradient(circle at 30% 30%,rgba(247,148,29,.34),rgba(247,148,29,0) 62%);\"><\u002Fdiv>\n      <div aria-hidden=\"true\" style=\"position:absolute; left:-120px; bottom:120px; width:360px; height:360px; border-radius:50%; border:1px solid rgba(255,255,255,.06);\"><\u002Fdiv>\n      <div style=\"flex:1; display:flex; flex-direction:column; padding:64px 72px 0;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:24px;\">\n          <div style=\"background:#fff; border-radius:14px; padding:26px 30px 22px; box-shadow:0 14px 40px rgba(0,0,0,.22);\">\n            <img src=\"cec7fc23-3178-4045-8f5a-93703046bf05\" alt=\"Helio Solar\" style=\"height:74px; display:block;\">\n            <div style=\"height:2px; width:34px; background:#C9C6D8; margin:16px 0 10px;\"><\u002Fdiv>\n            <div style=\"font-size:13px; letter-spacing:.04em; color:#6B6D86; font-weight:600;\">Tomorrow’s energy today<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right; padding-top:8px;\">\n            <div style=\"font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:#A7A3D0; font-weight:700;\">Внутренний стандарт<\u002Fdiv>\n            <div style=\"font-size:13px; color:#CFCCE6; margin-top:8px; font-weight:500;\">Отдел продаж&nbsp;и&nbsp;маркетинга<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto; padding-bottom:88px;\">\n          <div style=\"font-size:13px; letter-spacing:.34em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:22px;\">Helio Solar KZ<\u002Fdiv>\n          <h1 style=\"font-size:86px; line-height:.98; font-weight:800; letter-spacing:-.02em; margin:0 0 24px;\">Система<br>продаж<\u002Fh1>\n          <p style=\"font-size:23px; line-height:1.4; font-weight:500; color:#E4E2F2; max-width:620px; margin:0 0 40px;\">Скрипты, УТП и методология заключения сделок — рабочая система от первого касания до подписания договора.<\u002Fp>\n          <div style=\"display:flex; gap:48px; flex-wrap:wrap; font-size:14px; color:#BDB9DC; font-weight:600; letter-spacing:.02em;\">\n            <div><span style=\"color:#7C78A8; display:block; font-size:11px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px;\">Назначение<\u002Fspan>Внутренний документ<\u002Fdiv>\n            <div style=\"align-self:flex-end;\">Алматы, 2026<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(90deg,#F7941D,#FBB040); color:#fff; padding:14px 72px; font-size:11px; letter-spacing:.05em; font-weight:600;\">\n        Все права защищены. Любое копирование и воспроизведение материала, в том числе частичное и в любых формах, без письменного разрешения правообладателя запрещено.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ TABLE OF CONTENTS ============ -->\n    <section class=\"page-break\" data-screen-label=\"Содержание\" style=\"padding:72px 0 48px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n        <span style=\"font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:#D87D08; font-weight:800;\">Навигация<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:#E7E2D7;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-size:42px; font-weight:800; letter-spacing:-.02em; margin:0 0 36px;\">Содержание<\u002Fh2>\n      <div style=\"columns:2; column-gap:56px;\">\n        <a href=\"#summary\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">—<\u002Fspan><span style=\"font-weight:600;\">Руководство для ОП<\u002Fspan><\u002Fa>\n        <a href=\"#p1\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">I<\u002Fspan><span style=\"font-weight:600;\">Система УТП: на чём держится разговор<\u002Fspan><\u002Fa>\n        <a href=\"#p2\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">II<\u002Fspan><span style=\"font-weight:600;\">Подготовка менеджера<\u002Fspan><\u002Fa>\n        <a href=\"#p3\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">III<\u002Fspan><span style=\"font-weight:600;\">Начало разговора<\u002Fspan><\u002Fa>\n        <a href=\"#p4\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">IV<\u002Fspan><span style=\"font-weight:600;\">Установление доверия<\u002Fspan><\u002Fa>\n        <a href=\"#p5\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">V<\u002Fspan><span style=\"font-weight:600;\">Выявление потребностей по SPIN<\u002Fspan><\u002Fa>\n        <a href=\"#p6\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">VI<\u002Fspan><span style=\"font-weight:600;\">Диагностика клиента<\u002Fspan><\u002Fa>\n        <a href=\"#p7\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">VII<\u002Fspan><span style=\"font-weight:600;\">Презентация: от проблемы к выгоде<\u002Fspan><\u002Fa>\n        <a href=\"#p8\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">VIII<\u002Fspan><span style=\"font-weight:600;\">Работа с возражениями<\u002Fspan><\u002Fa>\n        <a href=\"#p9\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">IX<\u002Fspan><span style=\"font-weight:600;\">Методы убеждения<\u002Fspan><\u002Fa>\n        <a href=\"#p10\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">X<\u002Fspan><span style=\"font-weight:600;\">Закрытие сделки<\u002Fspan><\u002Fa>\n        <a href=\"#p11\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XI<\u002Fspan><span style=\"font-weight:600;\">Если клиент не готов купить<\u002Fspan><\u002Fa>\n        <a href=\"#p12\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XII<\u002Fspan><span style=\"font-weight:600;\">Работа с эмоциями<\u002Fspan><\u002Fa>\n        <a href=\"#p13\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XIII<\u002Fspan><span style=\"font-weight:600;\">Анализ разговора и вероятность сделки<\u002Fspan><\u002Fa>\n        <a href=\"#p14\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XIV<\u002Fspan><span style=\"font-weight:600;\">Три версии скрипта<\u002Fspan><\u002Fa>\n        <a href=\"#p15\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XV<\u002Fspan><span style=\"font-weight:600;\">Готовые скрипты<\u002Fspan><\u002Fa>\n        <a href=\"#p16\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XVI<\u002Fspan><span style=\"font-weight:600;\">Десять смоделированных диалогов<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ EXECUTIVE SUMMARY ============ -->\n    <section id=\"summary\" class=\"page-break\" data-screen-label=\"Руководство для ОП\" style=\"padding:72px 0 40px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n        <span style=\"font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:#D87D08; font-weight:800;\">Executive summary<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:#E7E2D7;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-size:42px; font-weight:800; letter-spacing:-.02em; margin:0 0 28px;\">Руководство для ОП<\u002Fh2>\n\n      <p style=\"font-size:18px; line-height:1.6; color:#33343B; margin:0 0 22px;\">Это рабочая система продаж для менеджеров,  для ведения сделки от первого касания до подписания договора. Документ построен на сегментационном анализе целевой аудитории, системе УТП и B2B-стратегии компании.<\u002Fp>\n\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:6px 1fr; gap:0; margin:32px 0; border-radius:12px; overflow:hidden; box-shadow:0 1px 0 #EFEBE2;\">\n        <div style=\"background:linear-gradient(180deg,#F7941D,#FBB040);\"><\u002Fdiv>\n        <div style=\"background:#FBF4E9; padding:28px 32px;\">\n          <div style=\"font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#B0750C; font-weight:800; margin-bottom:10px;\">Главная идея<\u002Fdiv>\n          <p style=\"font-size:21px; line-height:1.45; font-weight:700; color:#2B2B31; margin:0;\">Мы не продаём солнечные панели. Мы продаём управляемую стоимость электроэнергии на 25 лет вперёд и финансовый актив с понятной окупаемостью.<\u002Fp>\n          <p style=\"font-size:15px; color:#6A5A3E; margin:12px 0 0;\">Менеджер, усвоивший это одно предложение, продаёт лучше, чем тот, кто заучил весь документ наизусть.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:#5E6066; font-weight:800; margin:36px 0 18px;\">Что внутри<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 28px;\">\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">01<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Система УТП<\u002Fb> — материнское предложение и четыре сегментных УТП с готовыми формулировками под канал.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">02<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Подготовка менеджера<\u002Fb> — настрой, цель разговора, ошибки, которые убивают сделку.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">03<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Анатомия разговора<\u002Fb> — открытие, доверие, SPIN-диагностика, презентация «проблема → решение → выгода».<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">04<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Работа с возражениями<\u002Fb> — 26 реальных возражений рынка РК с верным и ошибочным ответом к каждому.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">05<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Закрытие<\u002Fb> — 10 техник с примерами и зонами риска, сценарий «клиент не готов», система догрева.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">06<\u002Fspan><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Готовые скрипты и практика<\u002Fb> — три тональности и 10 смоделированных диалогов под трудных клиентов.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:#5E6066; font-weight:800; margin:42px 0 18px;\">Приоритет сегментов<\u002Fh3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">Система применима ко всем четырём сегментам, но фокус расставлен по стратегии компании. Везде, где сценарий зависит от сегмента, это отмечено прямо в тексте.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px;\">\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #F7941D; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#D87D08; font-weight:800;\">Приоритет №1<\u002Fdiv><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Коммерция<\u002Fdiv><p style=\"margin:0; font-size:13px; color:#6A6C72;\">и производство — лучший баланс чека, цикла и окупаемости.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Параллельно<\u002Fdiv><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Частные дома<\u002Fdiv><p style=\"margin:0; font-size:13px; color:#6A6C72;\">B2C — защита семьи и бюджета от тарифов.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Сезонно<\u002Fdiv><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Агробизнес<\u002Fdiv><p style=\"margin:0; font-size:13px; color:#6A6C72;\">на горизонте посевного и бюджетного цикла.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Горизонт<\u002Fdiv><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Промышленность<\u002Fdiv><p style=\"margin:0; font-size:13px; color:#6A6C72;\">стратегический капекс и ESG-соответствие.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:flex-start; margin:34px 0 0; padding:24px 28px; background:#F2F1FA; border-radius:12px;\">\n        <div style=\"flex:none; width:42px; height:42px; border-radius:50%; background:#2A2660; color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">!<\u002Fdiv>\n        <div><div style=\"font-weight:800; color:#2A2660; margin-bottom:4px;\">Принцип, который не обсуждается<\u002Fdiv><p style=\"margin:0; color:#3A3A55;\">Если расчёт показывает, что проект клиенту сейчас невыгоден — мы говорим об этом честно. Репутация «тех, кто считает по-настоящему» приносит больше сделок, чем любая дожимная техника.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART I ============ -->\n    <section id=\"p1\" class=\"bleed page-break keep\" data-screen-label=\"Часть I\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">I<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть первая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Система УТП: на чём держится разговор<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Скрипт без УТП — это вежливый способ услышать «нам не интересно». УТП отвечает на единственный вопрос, который клиент задаёт про себя в первые секунды: «почему я вообще должен это слушать». Поэтому система УТП идёт первой, и менеджер обязан знать материнское предложение и УТП своего сегмента наизусть.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:46px 0 20px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.1 — Материнское УТП<\u002Fh3>\n      <div class=\"keep\" style=\"border-radius:14px; overflow:hidden; margin:14px 0 26px; box-shadow:0 10px 30px rgba(42,38,96,.12);\">\n        <div style=\"background:linear-gradient(120deg,#2E2A66,#3A3680); color:#fff; padding:34px 38px;\">\n          <div style=\"font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:14px;\">Звучит так<\u002Fdiv>\n          <p style=\"font-size:26px; line-height:1.3; font-weight:700; margin:0;\">«Электричество как актив. Окупаемость от 2 лет. Гарантия и сервис. EPC-компания полного цикла.»<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 16px; color:#33343B;\">Оно делает то, чего не делает ни один конкурент на рынке Казахстана: переводит солнечную станцию из категории «оборудование и экология» в категорию «финансовый инструмент». Все остальные говорят одно и то же — «экономия», «независимость», «зелёная энергия». Это описание категории, а не позиционирование. Кто повторяет общие слова, становится пятым одинаковым подрядчиком в выдаче. Мы заходим с другой стороны: с цифры, актива и гарантии сервиса.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:22px;\">\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Ломает категорию<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">СЭС → актив, а не панели.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Основные факты<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">конкретика вместо обещаний.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Легко запомнить<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">повторяется без бумажки.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:24px 0 20px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.2 — Четыре сегментных УТП<\u002Fh3>\n      <p style=\"margin:6px 0 22px; color:#33343B;\">У каждого сегмента свой язык и своя эмоция: частнику — про защиту семьи, аграрию — про себестоимость продукции, бизнесу — про ROI, промышленности — про стратегию и ESG. Менеджер выбирает УТП по сегменту собеседника, а не по своему настроению.<\u002Fp>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\">\n            <th style=\"padding:14px 18px; font-weight:700;\">Сегмент<\u002Fth><th style=\"padding:14px 18px; font-weight:700;\">Главное УТП<\u002Fth><th style=\"padding:14px 18px; font-weight:700;\">Главная цифра<\u002Fth><th style=\"padding:14px 18px; font-weight:700;\">Что покупает клиент<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:15px 18px; font-weight:800; color:#D87D08;\">Коммерция<br><span style=\"font-size:11px; color:#9A9488; font-weight:700;\">приоритет №1<\u002Fspan><\u002Ftd><td style=\"padding:15px 18px; color:#33343B;\">«Превращаем крышу вашего бизнеса в актив с ROI 25–30% годовых»<\u002Ftd><td style=\"padding:15px 18px; font-weight:700;\">Окупаемость 2–4 года<\u002Ftd><td style=\"padding:15px 18px; color:#5E6066;\">Финансовый инструмент лучше депозита + статус<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:15px 18px; font-weight:800;\">Производство<\u002Ftd><td style=\"padding:15px 18px; color:#33343B;\">«Стратегический капекс с понятной экономикой и ESG-соответствием»<\u002Ftd><td style=\"padding:15px 18px; font-weight:700;\">LCOE ниже сетевого тарифа<\u002Ftd><td style=\"padding:15px 18px; color:#5E6066;\">Снижение OPEX на годы + энергобезопасность<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:15px 18px; font-weight:800;\">Частные дома<br><span style=\"font-size:11px; color:#9A9488; font-weight:700;\">B2C<\u002Fspan><\u002Ftd><td style=\"padding:15px 18px; color:#33343B;\">«Ваш дом перестаёт зависеть от ЭСО. Навсегда»<\u002Ftd><td style=\"padding:15px 18px; font-weight:700;\">Стабильная цена света на 25 лет<\u002Ftd><td style=\"padding:15px 18px; color:#5E6066;\">Защита семьи и бюджета от тарифов и отключений<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:15px 18px; font-weight:800;\">Агробизнес<\u002Ftd><td style=\"padding:15px 18px; color:#33343B;\">«Снижаем себестоимость вашей продукции на 8–25%. Один раз — навсегда»<\u002Ftd><td style=\"padding:15px 18px; font-weight:700;\">Окупаемость 3–4 года<\u002Ftd><td style=\"padding:15px 18px; color:#5E6066;\">Конкурентоспособность и фиксация энергозатрат<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:flex; gap:14px; align-items:flex-start; margin-top:20px; padding:20px 24px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\">\n        <div style=\"font-weight:800; color:#B0750C; font-size:13px; letter-spacing:.12em; text-transform:uppercase; flex:none; padding-top:2px;\">Тест<\u002Fdiv>\n        <p style=\"margin:0; color:#5A4A2C;\"><b style=\"color:#3A3010;\">Может ли это сказать конкурент? Если да — это не УТП.<\u002Fb> «Окупаемость от 2 лет», «ROI 25–30%», «−8–25% себестоимости» конкуренты не говорят, потому что не считают экономику в этой форме. В этом наша отстройка.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:24px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.3 — Антипозиционирование: от чего отказываемся<\u002Fh3>\n      <p style=\"margin:6px 0 20px; color:#33343B;\">Без чёткого «нет» нет и «да». Эти фразы запрещены в наших материалах и в разговоре, потому что они размывают позиционирование.<\u002Fp>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\u002Fspan><p style=\"margin:0;\"><b>«Зелёная энергия ради экологии планеты»<\u002Fb> — ни собственнику, ни частнику это не продаёт; экология вторична.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\u002Fspan><p style=\"margin:0;\"><b>«Самая низкая цена \u002F простая установка»<\u002Fb> — обесценивает экспертизу и снижает чек. Мы продаём через экономику, а не через дешевизну.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\u002Fspan><p style=\"margin:0;\"><b>«Сравнение с конкурентами в лоб»<\u002Fb> — мы продаём через ROI клиента, а не через «у них хуже».<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\u002Fspan><p style=\"margin:0;\"><b>«Под ключ» как главный аргумент<\u002Fb> — говорим «полный цикл EPC» и «единый подрядчик»: проектирование, поставка, монтаж, ввод и сервис в одних руках.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART II ============ -->\n    <section id=\"p2\" class=\"bleed page-break keep\" data-screen-label=\"Часть II\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">II<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть вторая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Подготовка менеджера<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Сделка выигрывается или проигрывается до первого слова. Клиент за 10–15 секунд считывает по голосу, говорит он с экспертом или с человеком, которому нужно «выполнить план». Поэтому подготовка — это не формальность, а половина результата.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:46px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.1 — Цель разговора<\u002Fh3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">У первого контакта одна цель, и это не продажа. Цель — получить право на следующий шаг: согласие на бесплатный расчёт или встречу. Менеджер, который продаёт следующий маленький шаг, закрывает в разы больше.<\u002Fp>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:14px 18px; font-weight:700; width:34%;\">Тип контакта<\u002Fth><th style=\"padding:14px 18px; font-weight:700;\">Правильная цель разговора<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:14px 18px; font-weight:700;\">Входящий лид<\u002Ftd><td style=\"padding:14px 18px; color:#33343B;\">Понять задачу, квалифицировать, договориться о расчёте под объект<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:14px 18px; font-weight:700;\">Холодный B2B-звонок<\u002Ftd><td style=\"padding:14px 18px; color:#33343B;\">Выйти на ЛПР и получить согласие на 20-минутную встречу или аудит<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:14px 18px; font-weight:700;\">Повторный контакт<\u002Ftd><td style=\"padding:14px 18px; color:#33343B;\">Снять накопившееся возражение и назначить дату решения<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:14px 18px; font-weight:700;\">Презентация расчёта<\u002Ftd><td style=\"padding:14px 18px; color:#33343B;\">Согласовать конфигурацию и финансирование, выйти на договор<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.2 — Психологический настрой<\u002Fh3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">Перед звонком менеджер находится в позиции «я помогаю клиенту принять выгодное решение», а не «я уговариваю купить». Это слышно. Четыре установки, которые держат в голове:<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я эксперт, а не проситель<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Я не прошу о покупке — я приношу расчёт, которого у клиента нет.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Отказ — это не про меня<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Большинство первых «нет» — про неудачный момент, а не про продукт.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я не тороплюсь<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Спокойный темп речи = уверенность. Кто торопится, как будто что-то скрывает.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я веду, а не догоняю<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Вопросы задаёт тот, кто контролирует ситуацию. Задаю вопросы я.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">2.3 — Ошибки, которые нельзя совершать<\u002Fh3>\n      <div class=\"keep\" style=\"border:1px solid #F0DAD3; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#B8412F; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:42%;\">Ошибка<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Почему убивает сделку<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Сразу называть цену<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Цена без выгоды всегда «дорого». Сначала ценность и экономика, потом цифра.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Перечислять характеристики<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Клиенту нужны не панели, а результат. Перегруз техникой отпугивает.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Перебивать и «дожимать»<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Давление включает защиту. Чем сильнее давишь, тем тише клиент закрывается.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Спорить с возражением<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Спор клиент проигрывать не любит — он просто уходит. Возражение разбирают.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Обещать неподтверждённое расчётом<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Одно завышенное обещание — и эксперт превращается в продавца. Доверие не вернуть.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Говорить «зелёная энергия, экология»<\u002Ftd><td style=\"padding:13px 18px; color:#5E5550;\">Для ЛПР это шум. Он считает деньги. Говорим про актив и окупаемость.<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.4 — Как звучать уверенно<\u002Fh3>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\"><b>Темп — медленнее, чем хочется.<\u002Fb> Паузы — это сила. После вопроса замолчите и дайте клиенту ответить.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\"><b>Голос вниз в конце фразы.<\u002Fb> Утверждение, а не вопрос. «Подготовлю расчёт.» — точка, не просьба о разрешении.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\"><b>Конкретика вместо воды.<\u002Fb> Не «значительная экономия», а «по вашему счёту — порядка 8 миллионов тенге в год».<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\"><b>Имя клиента 2–3 раза за разговор<\u002Fb> — но не чаще, иначе звучит как тренинг по продажам.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\"><b>Улыбка в голосе<\u002Fb> на открытии и в закрытии. Её слышно даже по телефону.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART III ============ -->\n    <section id=\"p3\" class=\"bleed page-break keep\" data-screen-label=\"Часть III\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">III<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть третья<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Начало разговора<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Первые 15 секунд решают, будут ли следующие пять минут. Задача открытия — не представиться (это делают все), а дать клиенту повод не класть трубку. Ниже — рабочие варианты под разные ситуации, и к каждому объяснение, почему он работает.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:22px;\">\n      <!-- opening 3.1 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.1 — Входящий лид<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">тёплый контакт<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Здравствуйте, [Имя]! Меня зовут ___, Helio Solar KZ. Спасибо, что оставили заявку. Удобно 5 минут? Я не буду предлагать стандартное решение — сначала пойму вашу задачу, и под неё мы сделаем расчёт именно по вашему объекту.»<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\u002Fdiv><span style=\"color:#5E6066;\">Снимает страх «сейчас будут впаривать». Переворачивает ожидание.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\u002Fdiv><span style=\"color:#5E6066;\">Облегчение и любопытство. Клиент готов говорить.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\u002Fdiv><span style=\"color:#5E6066;\">Всегда на тёплом лиде — человек уже поднял руку.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- opening 3.2 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.2 — Холодный B2B: выход на ЛПР<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">через секретаря<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Добрый день! ___, компания Helio Solar KZ. Мы помогаем предприятиям снижать расходы на электроэнергию до 70% за счёт собственной генерации — без остановки производства. Подскажите, кто у вас отвечает за снижение затрат на энергоресурсы и инвестиционные проекты?»<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\u002Fdiv><span style=\"color:#5E6066;\">Первая фраза — сразу выгода и цифра, а не «мы занимаемся СЭС».<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\u002Fdiv><span style=\"color:#5E6066;\">Деловой интерес. «До 70%» — крючок для любого, кто отвечает за затраты.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\u002Fdiv><span style=\"color:#5E6066;\">Первый холодный контакт, когда ЛПР ещё неизвестен.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- opening 3.3 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.3 — Открытие через боль<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">прохладный контакт<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Можно один вопрос? Если стоимость электроэнергии за пару лет вырастет ещё на 30–40% — как это отразится на себестоимости вашей продукции? Именно эту задачу сегодня решают наши клиенты.»<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\u002Fdiv><span style=\"color:#5E6066;\">Вопрос, на который нельзя ответить «нет». Клиент сам проговаривает проблему.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\u002Fdiv><span style=\"color:#5E6066;\">Лёгкая тревога + интерес. Тревога мобилизует внимание.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\u002Fdiv><span style=\"color:#5E6066;\">Производство и агро, где доля энергии в себестоимости высока.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- opening 3.4 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#2A2660;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#F7A93C;\">3.4 — Премиальное открытие<\u002Fspan><span style=\"font-size:12px; color:#BDB9DC; font-weight:700;\">крупный B2B<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #2A2660; padding-left:18px;\">«Добрый день! Мы не продаём солнечные панели. Мы создаём для предприятий собственный источник дешёвой электроэнергии на 25–30 лет вперёд. После нашего расчёта руководители обычно видят, сколько миллионов тенге в год можно оставлять внутри компании вместо оплаты растущих тарифов. Если найдётся 20 минут — покажем это на ваших цифрах.»<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\u002Fdiv><span style=\"color:#5E6066;\">«Мы не продаём панели» обезоруживает. Дальше — масштаб под уровень собеседника.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\u002Fdiv><span style=\"color:#5E6066;\">Уважение. С ЛПР говорят на его языке — деньги и горизонт.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\u002Fdiv><span style=\"color:#5E6066;\">Собственник, ген.директор, крупный объект.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- opening 3.5 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.5 — Частный дом<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">B2C<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Здравствуйте! Я не буду продавать панели. Хочу показать, во что вам обойдётся электричество к 2030 году при нынешнем росте тарифов — и как это можно зафиксировать уже сейчас. Это 5 минут, и без обязательств. Удобно?»<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\u002Fdiv><span style=\"color:#5E6066;\">Апеллирует к бытовой тревоге — росту счетов — и сразу обещает решение без обязательств.<\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\u002Fdiv><span style=\"color:#5E6066;\">«Это про меня». Частник думает о семье и бюджете, а не об инвестициях.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART IV ============ -->\n    <section id=\"p4\" class=\"bleed page-break keep\" data-screen-label=\"Часть IV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">IV<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть четвёртая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Установление доверия<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Доверие — это валюта, на которую покупается право задавать неудобные вопросы и называть цену. Без доверия любой расчёт воспринимается как «развод». Оно строится не комплиментами, а поведением. Пять рычагов, которые работают на рынке Казахстана.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:14px;\">\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">01<\u002Fdiv>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Принцип взаимности<\u002Fdiv><p style=\"margin:0 0 12px; color:#33343B;\">Сначала дай — потом проси. Бесплатный расчёт, аудит, честная оценка «вам это сейчас невыгодно» создают у клиента ощущение долга. Человек, которому помогли бесплатно, склонен ответить взаимностью.<\u002Fp><div style=\"background:#FBF4E9; border-radius:9px; padding:12px 16px; font-size:14px; font-style:italic; color:#6A5A3E;\"><b style=\"font-style:normal; color:#B0750C; font-size:11px; letter-spacing:.1em; text-transform:uppercase; display:block; margin-bottom:4px;\">Фраза-рычаг<\u002Fb>«Расчёт ничего не стоит и ни к чему не обязывает. Если цифры покажут, что проект сейчас невыгоден — я честно скажу, и вы сэкономите время.»<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">02<\u002Fdiv>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Принцип авторитета<\u002Fdiv><p style=\"margin:0 0 12px; color:#33343B;\">Авторитет показывают, а не заявляют. «Мы лучшие» не работает. Работают факты: реализованные объекты, опыт с отраслью, цифры из похожих проектов, сертификаты ISO, гарантия 25 лет, финансирование через лизинговых партнёров.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\"><div style=\"background:#F6F3EC; border-radius:9px; padding:12px 16px; font-size:13.5px; color:#5E6066;\"><b style=\"color:#2A2660;\">B2B:<\u002Fb> «Есть похожий объект — склад на N тыс. м². Пришлю анонимизированный расчёт, чтобы вы увидели порядок цифр.»<\u002Fdiv><div style=\"background:#F6F3EC; border-radius:9px; padding:12px 16px; font-size:13.5px; color:#5E6066;\"><b style=\"color:#2A2660;\">Агро:<\u002Fb> «Делали ТЭО под поливные хозяйства в вашем регионе, с учётом сезонности насосов. Это не шаблон.»<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">03<\u002Fdiv>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Симпатия и раппорт<\u002Fdiv><p style=\"margin:0; color:#33343B;\">Люди покупают у тех, кто на них похож и кто их слышит. Раппорт — это подстройка под темп и манеру: говорит медленно — сбавьте; говорит цифрами — отвечайте цифрами. ЛПР говорит «OPEX» — говорите «OPEX»; фермер говорит «соляра» — не поправляйте. Маленькое личное наблюдение в начале сближает быстрее любого скрипта.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">04<\u002Fdiv>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Активное слушание<\u002Fdiv><p style=\"margin:0 0 12px; color:#33343B;\">Самый недооценённый навык. На этапе диагностики клиент говорит минимум 60% времени. Слушание — это не молчание, а возвращение клиенту его же слов:<\u002Fp>\n          <div style=\"display:grid; gap:8px; font-size:13.5px;\"><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Эхо<\u002Fb><span style=\"color:#5E6066;\">«То есть летом счёт доходит до трёх миллионов — правильно понимаю?»<\u002Fspan><\u002Fdiv><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Уточнение<\u002Fb><span style=\"color:#5E6066;\">«А что для вас самое больное — сама сумма или её непредсказуемость?»<\u002Fspan><\u002Fdiv><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Резюме<\u002Fb><span style=\"color:#5E6066;\">«Если суммировать: важно зафиксировать стоимость и убрать зависимость от сети. Верно?»<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">05<\u002Fdiv>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Эмоциональное отражение<\u002Fdiv><p style=\"margin:0; color:#33343B;\">Назвать эмоцию клиента вслух — значит снять её напряжение. «Понимаю, вы наверняка уже сталкивались с подрядчиками, которые наобещали и пропали» — и клиент расслабляется, потому что его опасение признали. Работает особенно сильно с настороженными и обжёгшимися клиентами.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:flex-start; margin-top:8px; padding:22px 26px; background:#F2F1FA; border-radius:12px;\">\n        <div style=\"flex:none; width:40px; height:40px; border-radius:50%; background:#2A2660; color:#fff; display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:800;\">!<\u002Fdiv>\n        <div><div style=\"font-weight:800; color:#2A2660; margin-bottom:4px;\">Главное правило доверия<\u002Fdiv><p style=\"margin:0; color:#3A3A55;\">Ни одного обещания, которое нельзя подтвердить расчётом или документом. Доверие строится месяцами и рушится одной завышенной цифрой.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART V ============ -->\n    <section id=\"p5\" class=\"bleed page-break keep\" data-screen-label=\"Часть V\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">V<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть пятая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Выявление потребностей по SPIN<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">SPIN — это не допрос, а лестница. Четыре типа вопросов ведут клиента от фактов к осознанию проблемы, от проблемы к её цене и от цены к желанию решить. Вывод клиент делает сам — а к собственным выводам не возражают. Порядок строгий: нельзя перепрыгивать к презентации, не пройдя Implication.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 36px;\">\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#EFE9F3; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#7A76B0;\">S<\u002Fdiv>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Situation — ситуационные вопросы<\u002Fdiv><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Собираем факты. Коротко и по делу — не самая интересная часть, не затягиваем.<\u002Fdiv><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Какой примерно ежемесячный счёт за электроэнергию? А в пиковые месяцы?<\u002Fli><li>Объект в собственности или в аренде? Какая площадь крыши \u002F территории свободна?<\u002Fli><li>Потребление в основном днём или круглосуточно?<\u002Fli><li>Кто, кроме вас, участвует в принятии таких решений?<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#E7DFEE; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#6A5AA0;\">P<\u002Fdiv>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Problem — проблемные вопросы<\u002Fdiv><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Вскрываем боль. Здесь клиент впервые проговаривает, что его не устраивает.<\u002Fdiv><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Насколько вырос ваш счёт за последние два года?<\u002Fli><li>Случались ли отключения, которые останавливали работу? Что это стоило?<\u002Fli><li>Насколько предсказуема энергостатья при планировании бюджета?<\u002Fli><li>Доля энергии в себестоимости устраивает или уже мешает конкурировать по цене?<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:2px solid #F7941D; box-shadow:0 8px 26px rgba(247,148,29,.16);\">\n          <div style=\"background:linear-gradient(180deg,#F7941D,#FBB040); display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#fff;\">I<\u002Fdiv>\n          <div style=\"padding:20px 24px;\"><div style=\"display:flex; align-items:center; gap:10px; margin-bottom:3px;\"><div style=\"font-weight:800; font-size:16px;\">Implication — извлекающие вопросы<\u002Fdiv><span style=\"background:#FBF0DD; color:#B0750C; font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; border-radius:5px;\">ядро метода<\u002Fspan><\u002Fdiv><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Здесь проблема превращается в деньги и риски. Клиент должен почувствовать, что бездействие стоит дороже решения.<\u002Fdiv><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Если тариф вырастет ещё на 30–40% за пару лет — что произойдёт с вашей маржой?<\u002Fli><li>Сколько вы уже переплатили за время, что откладываете решение? Давайте прикинем.<\u002Fli><li>Если конкурент зафиксирует себестоимость энергии на 25 лет, а вы — нет, кто выиграет тендер по цене?<\u002Fli><li>Во что обходится один день простоя при отключении — выручка, штрафы, сырьё?<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#E5EFE9; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#2E8059;\">N<\u002Fdiv>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Need-payoff — направляющие вопросы<\u002Fdiv><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Разворачиваем клиента к решению. Он сам формулирует ценность — и фактически продаёт себе.<\u002Fdiv><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Если бы стоимость электричества была зафиксирована на 25 лет — насколько спокойнее планировать бюджет?<\u002Fli><li>Что бы дало снижение энергозатрат на 60–70% — куда направили бы высвободившиеся деньги?<\u002Fli><li>Насколько полезно показать партнёрам и банку ESG-документы по углеродному следу?<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin-top:20px; padding:20px 26px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\">\n        <div style=\"font-size:30px; font-weight:800; color:#D87D08; flex:none;\">60\u002F40<\u002Fdiv>\n        <p style=\"margin:0; color:#5A4A2C;\"><b style=\"color:#3A3010;\">Правило 60\u002F40.<\u002Fb> На этом этапе клиент говорит 60% времени, менеджер — 40%. Если наоборот — вы презентуете вслепую и почти наверняка промахнётесь мимо настоящей боли.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART VI ============ -->\n    <section id=\"p6\" class=\"bleed page-break keep\" data-screen-label=\"Часть VI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">VI<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть шестая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Диагностика клиента<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Пока клиент отвечает на SPIN-вопросы, менеджер параллельно ставит «диагноз» — кто перед ним и насколько горяч. От этого зависит вся дальнейшая тактика. Ниже — рабочая шкала, которую заполняют прямо в CRM по ходу разговора.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.1 — Тип личности и как с ним говорить<\u002Fh3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:24%;\">Тип<\u002Fth><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Как распознать<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Как продавать<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Аналитик<br><span style=\"font-size:11px; color:#9A9488;\">финдир, гл. энергетик<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Просит цифры, задаёт уточняющие вопросы, осторожен<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">P&amp;L-модель, IRR\u002FNPV, расчёт чувствительности. Не давите эмоцией.<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Хозяин<br><span style=\"font-size:11px; color:#9A9488;\">собственник, ЛПР<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Говорит о результате и статусе, решает быстро<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Масштаб, ROI, конкурентное преимущество, «вы будете первым в районе».<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Скептик<br><span style=\"font-size:11px; color:#9A9488;\">обжёгся на подрядчиках<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Возражает заранее, ждёт подвоха<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Честность, гарантии, SLA, кейсы, «если невыгодно — скажем прямо».<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Технарь<br><span style=\"font-size:11px; color:#9A9488;\">гл. инженер<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Уходит в детали оборудования<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Говорите на его языке, но возвращайте к экономике для ЛПР.<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.2 — Квалификация лида (BANT + срочность)<\u002Fh3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:20%;\">Параметр<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Что выясняем<\u002Fth><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Сигнал «горячо»<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Бюджет<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Готовность к капексу или интерес к лизингу<\u002Ftd><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">«А есть рассрочка?» — берёт всерьёз<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Полномочия<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">ЛПР это или передаст наверх<\u002Ftd><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Сам принимает решение<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Потребность<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Острая боль или «просто интересуюсь»<\u002Ftd><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Называет конкретную проблему в деньгах<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Срочность<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Окно решения и его причина<\u002Ftd><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Стройка, рост тарифа, поломка генератора<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Вероятность<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Итоговая оценка 1–100%<\u002Ftd><td style=\"padding:13px 18px; color:#1B7A4F; font-weight:600;\">Сумма сигналов выше<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.3 — Шкала готовности<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;\">\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #E7E2D7;\"><div style=\"background:#B8412F; color:#fff; padding:14px 18px;\"><div style=\"font-weight:800; font-size:16px;\">Горячий<\u002Fdiv><div style=\"font-size:24px; font-weight:800;\">70–100%<\u002Fdiv><\u002Fdiv><div style=\"padding:16px 18px;\"><p style=\"margin:0 0 10px; font-size:13px; color:#5E6066;\">Есть боль в деньгах, бюджет\u002Fинтерес к лизингу, ЛПР на связи, окно решения близко.<\u002Fp><div style=\"font-weight:700; font-size:13px; color:#B8412F;\">→ Немедленно расчёт + встреча<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n
