2Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Конечно. Чтобы подготовить нужное, подскажите — над чем именно: над цифрами, сроками или хотите с кем-то посоветоваться?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Хочу с партнёром обсудить.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Логично. Тогда сделаю расчёт так, чтобы его удобно было показать партнёру — с экономикой и финмоделью. И давайте наметим короткий созвон втроём, чтобы я ответил на вопросы сразу. Когда ему удобно — начало недели или конец?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Давайте в начале следующей.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Размытое «подумаю» вскрыто до конкретики (нужен партнёр) и закрыто датой встречи с реальным ЛПР.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D8 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 8 · Клиент, который раньше отказался<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">повторный контакт<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Дамир, добрый день! Весной мы считали станцию для вашего цеха, вы тогда отложили. С тех пор тариф для юрлиц подрос — ваша экономия по новому расчёту стала заметнее. Обновил цифры, переслать?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">А, да, помню. Ну пришлите, гляну.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Отправляю. И коротко: окупаемость сократилась, а лизинговое окно со ставкой от 12,6% сейчас открыто. Если по цифрам станет актуально — наметим встречу на этой неделе?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Давайте, если цифры нормальные — встретимся.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Повторный контакт с поводом (рост тарифа + обновлённый расчёт), а не с «ну что, надумали?». Дверь снова открыта.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D9 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 9 · Холодный звонок через секретаря<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">выход на ЛПР<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Компания такая-то, здравствуйте.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Добрый день! ___, Helio Solar KZ. Мы помогаем предприятиям снижать счёт за электроэнергию до 70% без остановки производства. Подскажите, кто у вас отвечает за затраты на энергоресурсы — с ним хотел бы коротко переговорить.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Это к главному инженеру, сейчас соединю… Слушаю вас.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Здравствуйте! Коротко: делаем солнечные станции от 1 МВт для промышленных объектов, полный цикл. Могу прислать пример ТЭО по похожему объекту, анонимизированный, чтобы вы увидели порядок экономики. На какую почту удобно?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Скиньте на мою, посмотрю.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Первая фраза — выгода и цифра. Через секретаря — вопросом о роли, не о человеке. ЛПР получает ценность (ТЭО), а не питч.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D10 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 10 · Повторный контакт (догрев)<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">окно бюджетного года<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Айгуль, добрый день! В прошлый раз вы просили вернуться ближе к новому бюджетному году. Он на носу — и как раз вышла свежая статистика по тарифам для юрлиц. Скинуть короткую выжимку и обновлённый расчёт по вашему отелю?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">О, спасибо, что не пропали. Да, присылайте.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Высылаю. Если в новом бюджете решите закладывать — могу подготовить финмодель под защиту перед собственником. Когда удобно созвониться на 15 минут?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">На следующей неделе наберите, обсудим.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Касание привязано к окну решения клиента (бюджетный год) и несёт пользу. Тёплый тон + конкретный следующий шаг.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ COLOPHON ============ -->\n    <section class=\"bleed keep\" style=\"background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:48px 72px; display:flex; align-items:center; justify-content:space-between; gap:30px; flex-wrap:wrap;\">\n      <div style=\"background:#fff; border-radius:12px; padding:16px 22px;\"><img src=\"23e11f2e-e217-4fea-aee2-ba7f44558674\" alt=\"Helio Solar\" style=\"height:38px; display:block;\"><\u002Fdiv>\n      <div style=\"text-align:right; font-size:13px; color:#BDB9DC; line-height:1.7;\"><div style=\"color:#F7A93C; font-weight:800; letter-spacing:.04em;\">Система продаж · Внутренний документ<\u002Fdiv>Helio Solar KZ · Отдел продаж и маркетинга · Алматы, 2026<br><span style=\"font-size:11px; color:#7C78A8;\">Все права защищены. Копирование без письменного разрешения правообладателя запрещено.<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!--INSERT-->\n\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
