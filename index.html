document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a56745d3-7e5b-4294-8fa0-53b76b468561\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\/style>\n<style>\n  * { box-sizing: border-box; }\n  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n  body { margin: 0; background: #E8E5DD; color: #24242A;\n         font-family: 'Manrope', system-ui, sans-serif; font-size: 15.5px; line-height: 1.62; }\n  :root { --pad: 0.8in; }\n  .doc { box-sizing: border-box; max-width: 8.5in; margin: 0 auto; background: #FCFBF8;\n         padding: 0 var(--pad); box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 18px 50px rgba(0,0,0,.10); }\n  .bleed { margin-left: calc(-1 * var(--pad)); margin-right: calc(-1 * var(--pad)); }\n  h1, h2, h3, h4 { text-wrap: balance; margin: 0; }\n  p, li { text-wrap: pretty; }\n  /* Grid/flex children default to min-width:auto, which keeps a \"1fr\" text\n     column from shrinking below the width of its longest unbroken word. On\n     very narrow phones (≤360px) that's enough to push a perfectly normal\n     two-column \"badge + text\" card wider than the viewport. overflow-wrap\n     lets long words break as a last resort; min-width:0 lets the column\n     itself actually honor its 1fr share instead of refusing to shrink. */\n  p, li, td, th, span, div { overflow-wrap: break-word; }\n  [style*=\"display:grid\"] > *, [style*=\"display:flex\"] > * { min-width: 0; }\n  a { color: inherit; text-decoration: none; }\n  ::selection { background: #FBD9A6; }\n  /* Text pages get top/bottom breathing room; left/right come from .doc padding.\n     The cover is a dedicated full-bleed page with no margins. */\n  @page { size: A4; margin: 11mm 0; }\n  @page cover { size: A4; margin: 0; }\n  @media print {\n    html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n    html, body { margin: 0; padding: 0; background: #fff; }\n    .doc { max-width: none !important; margin: 0 !important; box-shadow: none !important; }\n    /* Cover fills exactly one page edge-to-edge. */\n    #cover { page: cover; min-height: 296mm !important; }\n    /* Keep headings attached to the content that follows them. */\n    h2, h3, h4 { break-after: avoid; }\n    /* Never split these blocks across a page. */\n    figure, blockquote, img, tr, .keep { break-inside: avoid; }\n    /* Big content sections may flow across pages; their inner .keep blocks stay intact. */\n    .flow { break-inside: auto; }\n    p, li { orphans: 3; widows: 3; }\n    .screen-only { display: none !important; }\n    /* Every chapter / topic starts on a fresh page. */\n    .page-break { break-before: page; }\n  }\n  @media (max-width: 800px) { :root { --pad: 24px; } .mcol-1 { grid-template-columns: 1fr !important; } }\n@media (max-width: 640px) {\n  :root { --pad: 18px; }\n  body { font-size: 14.5px; }\n  .doc { box-shadow: none; }\n\n  /* Cover page: big gap between the logo header and the main heading on mobile,\n     plus the description + Назначение row dropped lower. Class-based because the\n     bundler normalises inline styles, which breaks [style*=...] matches. */\n  #cover .cover-main {\n    margin-top: 150px !important;\n    padding-bottom: 32px !important;\n  }\n  #cover .cover-main > p {\n    margin-top: 30px !important;\n  }\n  #cover .cover-meta {\n    margin-top: 52px !important;\n  }\n  /* Cover right-column block: reduce text size on mobile so it stays right-aligned cleanly */\n  #cover > div:nth-of-type(4) > div:first-child > div:last-child > div {\n    font-size: 14px !important;\n    line-height: 1.35 !important;\n  }\n\n  /* Cover page: shrink the hero title, reflow the top header row */\n  #cover { min-height: auto !important; padding-bottom: 40px; }\n  #cover > div:nth-of-type(4) { padding: 36px 20px 0 !important; }\n  #cover h1 { font-size: 46px !important; margin-bottom: 16px !important; }\n  #cover > div:nth-of-type(4) > div:first-child {\n    flex-direction: row !important; align-items: flex-start !important; gap: 16px !important;\n    flex-wrap: wrap !important;\n  }\n  #cover > div:nth-of-type(4) > div:first-child > div:last-child {\n    text-align: right !important;\n    padding-top: 0 !important;\n    margin-left: auto !important;\n  }\n  #cover > div:nth-of-type(4) > div:first-child > div:first-child img { height: 64px !important; }\n  #cover p { font-size: 17px !important; }\n  #cover .cover-meta { gap: 22px !important; row-gap: 10px !important; }\n  #cover div[style*=\"padding:14px 72px\"] { padding: 12px 20px !important; font-size: 10px !important; }\n\n  /* Table of contents: force single column */\n  div[style*=\"columns:2\"] { columns: 1 !important; }\n\n  /* Part divider pages: shrink the giant roman numerals and headings */\n  section[id^=\"p\"][class*=\"bleed\"] { padding: 32px 22px !important; }\n  section[id^=\"p\"][class*=\"bleed\"] > div[style*=\"align-items:center; gap:30px\"] { gap: 16px !important; }\n  section[id^=\"p\"][class*=\"bleed\"] div[style*=\"font-size:104px\"],\n  section[id^=\"p\"][class*=\"bleed\"] div[style*=\"font-size:88px\"],\n  section[id^=\"p\"][class*=\"bleed\"] div[style*=\"font-size:80px\"] { font-size: 50px !important; }\n  section[id^=\"p\"][class*=\"bleed\"] h2 { font-size: 24px !important; }\n  section[id^=\"p\"][class*=\"bleed\"] p { font-size: 14.5px !important; }\n\n  /* Multi-column equal-width grids collapse to one column on narrow screens.\n     Matches both <div> and <section> grid containers — some card grids in this\n     document are set directly on the <section style=\"display:grid;...\"> wrapper\n     rather than on an inner <div>, and need the same selector to be caught. */\n  div[style*=\"grid-template-columns:1fr 1fr 1fr 1fr\"],\n  section[style*=\"grid-template-columns:1fr 1fr 1fr 1fr\"],\n  div[style*=\"grid-template-columns:1fr 1fr 1fr\"],\n  section[style*=\"grid-template-columns:1fr 1fr 1fr\"],\n  div[style*=\"grid-template-columns:1fr 1fr\"],\n  section[style*=\"grid-template-columns:1fr 1fr\"] { grid-template-columns: 1fr !important; }\n  /* A card spanning all columns on desktop (grid-column:1 / -1) is a no-op once\n     the grid is forced to a single column, but keep it explicit for safety. */\n  div[style*=\"grid-column:1 / -1\"],\n  section[style*=\"grid-column:1 / -1\"] { grid-column: 1 !important; }\n\n  /* Score panel (1fr + fixed sidebar) reflows to stacked */\n  div[style*=\"grid-template-columns:1fr 280px\"],\n  section[style*=\"grid-template-columns:1fr 280px\"] { grid-template-columns: 1fr !important; }\n\n  /* Equal-width flex card rows (e.g. the 3-step \"Признать → Переформулировать →\n     Вернуть вопрос\" answer formula) wrap instead of squeezing each card below\n     its own text's minimum readable width. */\n  div[style*=\"display:flex; gap:14px; align-items:stretch\"] { flex-wrap: wrap !important; }\n  div[style*=\"display:flex; gap:14px; align-items:stretch\"] > div[style*=\"flex:1\"] {\n    flex: 1 1 200px !important;\n  }\n\n  /* Tables: each <table> sits inside a dedicated .table-scroll div (overflow-x:auto\n     set directly in markup) so wide tables scroll horizontally instead of clipping.\n     min-width keeps columns from squeezing into unreadable widths before the\n     scrollbar kicks in. */\n  table { min-width: 540px; }\n\n  /* Dialog bubbles get a bit more room on narrow screens */\n  div[style*=\"max-width:84%\"] { max-width: 92% !important; }\n\n  /* Large standalone numerals / quote blocks */\n  div[style*=\"font-size:96px\"],\n  div[style*=\"font-size:76px\"] { font-size: 44px !important; }\n  div[style*=\"font-size:34px; font-weight:800\"] { font-size: 24px !important; }\n\n  /* Section headings */\n  h2[style*=\"font-size:42px\"] { font-size: 28px !important; }\n  h2[style*=\"font-size:34px\"] { font-size: 24px !important; }\n\n\n  /* Force single-column stack regardless of generic grid collapse — used\n     where the default mobile reflow could still leave items side-by-side\n     (e.g. tablet/intermediate widths or nested grid contexts). */\n  .mcol-1 {\n    grid-template-columns: 1fr !important;\n    display: grid !important;\n  }\n\n  /* ============ MOBILE HORIZONTAL SCROLL GROUPS ============ */\n  /* Used on grids/flex rows that should keep their cards full-sized on mobile\n     and scroll horizontally instead of stacking. Targets containers tagged\n     with .mscroll. Uses higher-specificity selectors so it wins over the\n     generic [style*=grid-template-columns] collapses above. */\n  .mscroll {\n    display: flex !important;\n    flex-direction: row !important;\n    flex-wrap: nowrap !important;\n    overflow-x: auto !important;\n    gap: 12px !important;\n    scroll-snap-type: x mandatory;\n    -webkit-overflow-scrolling: touch;\n    padding-bottom: 10px;\n    margin-left: calc(var(--pad) * -1) !important;\n    margin-right: calc(var(--pad) * -1) !important;\n    padding-left: var(--pad);\n    padding-right: var(--pad);\n  }\n  .mscroll > * {\n    flex: 0 0 80% !important;\n    min-width: 260px !important;\n    max-width: 320px !important;\n    scroll-snap-align: start;\n  }\n  /* Wider cards for table-style scroll (part 9, 13.2/13.3) */\n  .mscroll.mscroll-wide > * {\n    flex: 0 0 88% !important;\n    min-width: 280px !important;\n    max-width: 360px !important;\n  }\n  /* Stack the small number column above the text on the part 4 cards\n     (54px+1fr → 1fr) so each block fits on screen. */\n  .mstack-num {\n    grid-template-columns: 1fr !important;\n    gap: 8px !important;\n  }\n  .mstack-num > :first-child {\n    font-size: 30px !important;\n  }\n\n  /* Подвал на мобильной версии: в строку — логотип слева, текст справа */\n  section.colophon {\n    flex-direction: row !important;\n    align-items: center !important;\n    justify-content: space-between !important;\n    padding: 26px 18px !important;\n    gap: 14px !important;\n  }\n  section.colophon > div:first-child {\n    text-align: left !important;\n    flex: 0 0 auto !important;\n  }\n  section.colophon > div:first-child img {\n    height: 36px !important;\n  }\n  section.colophon > div:last-child {\n    text-align: right !important;\n    flex: 1 1 auto !important;\n    font-size: 11px !important;\n    line-height: 1.5 !important;\n  }\n}\n\n/* ============ БУРГЕР-МЕНЮ (содержание по частям) ============ */\nhtml { scroll-behavior: smooth; }\nsection[id], [id] { scroll-margin-top: 16px; }\n\n#hsMenuToggle { position: fixed; width: 0; height: 0; opacity: 0; pointer-events: none; }\n\n.hs-burger {\n  position: fixed; top: 14px; right: 14px; z-index: 9000;\n  width: 46px; height: 46px; border-radius: 13px;\n  background: linear-gradient(135deg, #F7941D, #FBB040);\n  box-shadow: 0 4px 16px rgba(0,0,0,.30);\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;\n  cursor: pointer; transition: opacity .25s ease, transform .2s ease, visibility .25s ease;\n}\n.hs-burger:active { transform: scale(.94); }\n.hs-burger span { display: block; width: 22px; height: 2.5px; border-radius: 2px; background: #fff; }\n.hs-burger.hs-hide-on-cover { opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-12px); }\n\n.hs-backdrop {\n  position: fixed; inset: 0; z-index: 9001;\n  background: rgba(20,17,48,.55);\n  opacity: 0; visibility: hidden; transition: opacity .25s ease;\n  cursor: pointer;\n}\n\n.hs-menu {\n  position: fixed; top: 0; right: 0; bottom: 0; z-index: 9002;\n  width: min(86vw, 360px);\n  background: #26235C; background-image: linear-gradient(160deg, #2E2A66, #211E50);\n  color: #fff; box-shadow: -14px 0 44px rgba(0,0,0,.42);\n  transform: translateX(105%); transition: transform .3s cubi ef=\"#p8\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">VIII<\/span><span style=\"font-weight:600;\">Работа с возражениями<\/span><\/a>\n        <a href=\"#p9\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">IX<\/span><span style=\"font-weight:600;\">Методы убеждения<\/span><\/a>\n        <a href=\"#p10\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">X<\/span><span style=\"font-weight:600;\">Закрытие сделки<\/span><\/a>\n        <a href=\"#p11\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XI<\/span><span style=\"font-weight:600;\">Если клиент не готов купить<\/span><\/a>\n        <a href=\"#p12\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XII<\/span><span style=\"font-weight:600;\">Работа с эмоциями<\/span><\/a>\n        <a href=\"#p13\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XIII<\/span><span style=\"font-weight:600;\">Анализ разговора и вероятность сделки<\/span><\/a>\n        <a href=\"#p14\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XIV<\/span><span style=\"font-weight:600;\">Три версии скрипта<\/span><\/a>\n        <a href=\"#p15\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XV<\/span><span style=\"font-weight:600;\">Готовые скрипты<\/span><\/a>\n        <a href=\"#p16\" style=\"display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid #EFEBE2; break-inside:avoid;\"><span style=\"font-weight:800; color:#D87D08; min-width:30px;\">XVI<\/span><span style=\"font-weight:600;\">Десять смоделированных диалогов<\/span><\/a>\n        <\/div>\n    <\/section>\n\n    <!-- ============ EXECUTIVE SUMMARY ============ -->\n    <section id=\"summary\" class=\"page-break\" data-screen-label=\"Руководство для ОП\" style=\"padding:72px 0 40px;\">\n      <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:8px;\">\n        <span style=\"font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:#D87D08; font-weight:800;\">Executive summary<\/span>\n        <span style=\"flex:1; height:1px; background:#E7E2D7;\"><\/span>\n      <\/div>\n      <h2 style=\"font-size:42px; font-weight:800; letter-spacing:-.02em; margin:0 0 28px;\">Руководство для ОП<\/h2>\n\n      <p style=\"font-size:18px; line-height:1.6; color:#33343B; margin:0 0 22px;\">Это рабочая система продаж для менеджеров,  для ведения сделки от первого касания до подписания договора. Документ построен на сегментационном анализе целевой аудитории, системе УТП и B2B-стратегии компании.<\/p>\n\n      <div class=\"keep\" style=\"display:grid; grid-template-columns:6px 1fr; gap:0; margin:32px 0; border-radius:12px; overflow:hidden; box-shadow:0 1px 0 #EFEBE2;\">\n        <div style=\"background:linear-gradient(180deg,#F7941D,#FBB040);\"><\/div>\n        <div style=\"background:#FBF4E9; padding:28px 32px;\">\n          <div style=\"font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#B0750C; font-weight:800; margin-bottom:10px;\">Главная идея<\/div>\n          <p style=\"font-size:21px; line-height:1.45; font-weight:700; color:#2B2B31; margin:0;\">Мы не продаём солнечные панели. Мы продаём управляемую стоимость электроэнергии на 25 лет вперёд и финансовый актив с понятной окупаемостью.<\/p>\n          <p style=\"font-size:15px; color:#6A5A3E; margin:12px 0 0;\">Менеджер, усвоивший это одно предложение, продаёт лучше, чем тот, кто заучил весь документ наизусть.<\/p>\n        <\/div>\n      <\/div>\n\n      <h3 style=\"font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:#5E6066; font-weight:800; margin:36px 0 18px;\">Что внутри<\/h3>\n      <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 28px;\">\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">01<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Система УТП<\/b> — материнское предложение и четыре сегментных УТП с готовыми формулировками под канал.<\/p><\/div>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">02<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Подготовка менеджера<\/b> — настрой, цель разговора, ошибки, которые убивают сделку.<\/p><\/div>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">03<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Анатомия разговора<\/b> — открытие, доверие, SPIN-диагностика, презентация «проблема → решение → выгода».<\/p><\/div>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">04<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Работа с возражениями<\/b> — 26 реальных возражений рынка РК с верным и ошибочным ответом к каждому.<\/p><\/div>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">05<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Закрытие<\/b> — 10 техник с примерами и зонами риска, сценарий «клиент не готов», система догрева.<\/p><\/div>\n        <div style=\"display:flex; gap:14px; align-items:flex-start;\"><span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#2A2660; color:#fff; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center;\">06<\/span><p style=\"margin:0; font-size:14.5px;\"><b style=\"font-weight:700;\">Готовые скрипты и практика<\/b> — три тональности и 10 смоделированных диалогов под трудных клиентов.<\/p><\/div>\n      <\/div>\n\n      <h3 style=\"font-size:15px; letter-spacing:.16em; text-transform:uppercase; color:#5E6066; font-weight:800; margin:42px 0 18px;\">Приоритет сегментов<\/h3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">Система применима ко всем четырём сегментам, но фокус расставлен по стратегии компании. Везде, где сценарий зависит от сегмента, это отмечено прямо в тексте.<\/p>\n      <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px;\">\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #F7941D; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#D87D08; font-weight:800;\">Приоритет №1<\/div><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Коммерция<\/div><p style=\"margin:0; font-size:13px; color:#6A6C72;\">и производство — лучший баланс чека, цикла и окупаемости.<\/p><\/div>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Параллельно<\/div><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Частные дома<\/div><p style=\"margin:0; font-size:13px; color:#6A6C72;\">B2C — защита семьи и бюджета от тарифов.<\/p><\/div>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Сезонно<\/div><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Агробизнес<\/div><p style=\"margin:0; font-size:13px; color:#6A6C72;\">на горизонте посевного и бюджетного цикла.<\/p><\/div>\n        <div style=\"border:1px solid #E7E2D7; border-top:3px solid #2A2660; border-radius:10px; padding:16px 16px 18px;\"><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#5754A0; font-weight:800;\">Горизонт<\/div><div style=\"font-weight:800; font-size:16px; margin:6px 0 4px;\">Промышленность<\/div><p style=\"margin:0; font-size:13px; color:#6A6C72;\">стратегический капекс и ESG-соответствие.<\/p><\/div>\n      <\/div>\n\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:flex-start; margin:34px 0 0; padding:24px 28px; background:#F2F1FA; border-radius:12px;\">\n        <div style=\"flex:none; width:42px; height:42px; border-radius:50%; background:#2A2660; color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800;\">!<\/div>\n        <div><div style=\"font-weight:800; color:#2A2660; margin-bottom:4px;\">Принцип, который не обсуждается<\/div><p style=\"margin:0; color:#3A3A55;\">Если расчёт показывает, что проект клиенту сейчас невыгоден — мы говорим об этом честно. Репутация «тех, кто считает по-настоящему» приносит больше сделок, чем любая дожимная техника.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART I ============ -->\n    <section id=\"p1\" class=\"bleed page-break keep\" data-screen-label=\"Часть I\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">I<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть первая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Система УТП: на чём держится разговор<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Скрипт без УТП — это вежливый способ услышать «нам не интересно». УТП отвечает на единственный вопрос, который клиент задаёт про себя в первые секунды: «почему я вообще должен это слушать». Поэтому система УТП идёт первой, и менеджер обязан знать материнское предложение и УТП своего сегмента наизусть.<\/p>\n    <\/section>\n\n    <section style=\"padding:46px 0 20px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.1 — Материнское УТП<\/h3>\n      <div class=\"keep\" style=\"border-radius:14px; overflow:hidden; margin:14px 0 26px; box-shadow:0 10px 30px rgba(42,38,96,.12);\">\n        <div style=\"background:linear-gradient(120deg,#2E2A66,#3A3680); color:#fff; padding:34px 38px;\">\n          <div style=\"font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:14px;\">Звучит так<\/div>\n          <p style=\"font-size:26px; line-height:1.3; font-weight:700; margin:0;\">«Электричество как актив. Окупаемость от 2 лет. Гарантия и сервис. EPC-компания полного цикла.»<\/p>\n        <\/div>\n      <\/div>\n      <p style=\"margin:0 0 16px; color:#33343B;\">Оно делает то, чего не делает ни один конкурент на рынке Казахстана: переводит солнечную станцию из категории «оборудование и экология» в категорию «финансовый инструмент». Все остальные говорят одно и то же — «экономия», «независимость», «зелёная энергия». Это описание категории, а не позиционирование. Кто повторяет общие слова, становится пятым одинаковым подрядчиком в выдаче. Мы заходим с другой стороны: с цифры, актива и гарантии сервиса.<\/p>\n      <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:22px;\">\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Ломает категорию<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">СЭС → актив, а не панели.<\/p><\/div>\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Основные факты<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">конкретика вместо обещаний.<\/p><\/div>\n        <div style=\"background:#F6F3EC; border-radius:10px; padding:18px 20px;\"><div style=\"font-weight:800; color:#D87D08; margin-bottom:6px;\">Легко запомнить<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">повторяется без бумажки.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:24px 0 20px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.2 — Четыре сегментных УТП<\/h3>\n      <p style=\"margin:6px 0 22px; color:#33343B;\">У каждого сегмента свой язык и своя эмоция: частнику — про защиту семьи, аграрию — про себестоимость продукции, бизнесу — про ROI, промышленности — про стратегию и ESG. Менеджер выбирает УТП по сегменту собеседника, а не по своему настроению.<\/p>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\">\n            <th style=\"padding:14px 18px; font-weight:700;\">Сегмент<\/th><th style=\"padding:14px 18px; font-weight:700;\">Главное УТП<\/th><th style=\"padding:14px 18px; font-weight:700;\">Главная цифра<\/th><th style=\"padding:14px 18px; font-weight:700;\">Что покупает клиент<\/th>\n          <\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:15px 18px; font-weight:800; color:#D87D08;\">Коммерция<br><span style=\"font-size:11px; color:#9A9488; font-weight:700;\">приоритет №1<\/span><\/td><td style=\"padding:15px 18px; color:#33343B;\">«Превращаем крышу вашего бизнеса в актив с ROI 25–30% годовых»<\/td><td style=\"padding:15px 18px; font-weight:700;\">Окупаемость 2–4 года<\/td><td style=\"padding:15px 18px; color:#5E6066;\">Финансовый инструмент лучше депозита + статус<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:15px 18px; font-weight:800;\">Производство<\/td><td style=\"padding:15px 18px; color:#33343B;\">«Стратегический капекс с понятной экономикой и ESG-соответствием»<\/td><td style=\"padding:15px 18px; font-weight:700;\">LCOE ниже сетевого тарифа<\/td><td style=\"padding:15px 18px; color:#5E6066;\">Снижение OPEX на годы + энергобезопасность<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:15px 18px; font-weight:800;\">Частные дома<br><span style=\"font-size:11px; color:#9A9488; font-weight:700;\">B2C<\/span><\/td><td style=\"padding:15px 18px; color:#33343B;\">«Ваш дом перестаёт зависеть от ЭСО. Навсегда»<\/td><td style=\"padding:15px 18px; font-weight:700;\">Стабильная цена света на 25 лет<\/td><td style=\"padding:15px 18px; color:#5E6066;\">Защита семьи и бюджета от тарифов и отключений<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:15px 18px; font-weight:800;\">Агробизнес<\/td><td style=\"padding:15px 18px; color:#33343B;\">«Снижаем себестоимость вашей продукции на 8–25%. Один раз — навсегда»<\/td><td style=\"padding:15px 18px; font-weight:700;\">Окупаемость 3–4 года<\/td><td style=\"padding:15px 18px; color:#5E6066;\">Конкурентоспособность и фиксация энергозатрат<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n      <div class=\"keep\" style=\"display:flex; gap:14px; align-items:flex-start; margin-top:20px; padding:20px 24px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\">\n        <div style=\"font-weight:800; color:#B0750C; font-size:13px; letter-spacing:.12em; text-transform:uppercase; flex:none; padding-top:2px;\">Тест<\/div>\n        <p style=\"margin:0; color:#5A4A2C;\"><b style=\"color:#3A3010;\">Может ли это сказать конкурент? Если да — это не УТП.<\/b> «Окупаемость от 2 лет», «ROI 25–30%», «−8–25% себестоимости» конкуренты не говорят, потому что не считают экономику в этой форме. В этом наша отстройка.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:24px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:8px;\">1.3 — Антипозиционирование: от чего отказываемся<\/h3>\n      <p style=\"margin:6px 0 20px; color:#33343B;\">Без чёткого «нет» нет и «да». Эти фразы запрещены в наших материалах и в разговоре, потому что они размывают позиционирование.<\/p>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\/span><p style=\"margin:0;\"><b>«Зелёная энергия ради экологии планеты»<\/b> — ни собственнику, ни частнику это не продаёт; экология вторична.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\/span><p style=\"margin:0;\"><b>«Самая низкая цена / простая установка»<\/b> — обесценивает экспертизу и снижает чек. Мы продаём через экономику, а не через дешевизну.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\/span><p style=\"margin:0;\"><b>«Сравнение с конкурентами в лоб»<\/b> — мы продаём через ROI клиента, а не через «у них хуже».<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; align-items:start; padding:16px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:20px; font-weight:800; line-height:1.2;\">✕<\/span><p style=\"margin:0;\"><b>«Под ключ» как главный аргумент<\/b> — говорим «полный цикл EPC» и «единый подрядчик»: проектирование, поставка, монтаж, ввод и сервис в одних руках.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART II ============ -->\n    <section id=\"p2\" class=\"bleed page-break keep\" data-screen-label=\"Часть II\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">II<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть вторая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Подготовка менеджера<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Сделка выигрывается или проигрывается до первого слова. Клиент за 10–15 секунд считывает по голосу, говорит он с экспертом или с человеком, которому нужно «выполнить план». Поэтому подготовка — это не формальность, а половина результата.<\/p>\n    <\/section>\n\n    <section style=\"padding:46px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.1 — Цель разговора<\/h3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">У первого контакта одна цель, и это не продажа. Цель — получить право на следующий шаг: согласие на бесплатный расчёт или встречу. Менеджер, который продаёт следующий маленький шаг, закрывает в разы больше.<\/p>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:14px 18px; font-weight:700; width:34%;\">Тип контакта<\/th><th style=\"padding:14px 18px; font-weight:700;\">Правильная цель разговора<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:14px 18px; font-weight:700;\">Входящий лид<\/td><td style=\"padding:14px 18px; color:#33343B;\">Понять задачу, квалифицировать, договориться о расчёте под объект<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:14px 18px; font-weight:700;\">Холодный B2B-звонок<\/td><td style=\"padding:14px 18px; color:#33343B;\">Выйти на ЛПР и получить согласие на 20-минутную встречу или аудит<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:14px 18px; font-weight:700;\">Повторный контакт<\/td><td style=\"padding:14px 18px; color:#33343B;\">Снять накопившееся возражение и назначить дату решения<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:14px 18px; font-weight:700;\">Презентация расчёта<\/td><td style=\"padding:14px 18px; color:#33343B;\">Согласовать конфигурацию и финансирование, выйти на договор<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.2 — Психологический настрой<\/h3>\n      <p style=\"margin:0 0 20px; color:#33343B;\">Перед звонком менеджер находится в позиции «я помогаю клиенту принять выгодное решение», а не «я уговариваю купить». Это слышно. Четыре установки, которые держат в голове:<\/p>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я эксперт, а не проситель<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Я не прошу о покупке — я приношу расчёт, которого у клиента нет.<\/p><\/div>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Отказ — это не про меня<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Большинство первых «нет» — про неудачный момент, а не про продукт.<\/p><\/div>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я не тороплюсь<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Спокойный темп речи = уверенность. Кто торопится, как будто что-то скрывает.<\/p><\/div>\n        <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 22px;\"><div style=\"font-weight:800; margin-bottom:6px;\">Я веду, а не догоняю<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">Вопросы задаёт тот, кто контролирует ситуацию. Задаю вопросы я.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">2.3 — Ошибки, которые нельзя совершать<\/h3>\n      <div class=\"keep\" style=\"border:1px solid #F0DAD3; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#B8412F; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:42%;\">Ошибка<\/th><th style=\"padding:13px 18px; font-weight:700;\">Почему убивает сделку<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Сразу называть цену<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Цена без выгоды всегда «дорого». Сначала ценность и экономика, потом цифра.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Перечислять характеристики<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Клиенту нужны не панели, а результат. Перегруз техникой отпугивает.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Перебивать и «дожимать»<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Давление включает защиту. Чем сильнее давишь, тем тише клиент закрывается.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Спорить с возражением<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Спор клиент проигрывать не любит — он просто уходит. Возражение разбирают.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #F4E5E0;\"><td style=\"padding:13px 18px; font-weight:700;\">Обещать неподтверждённое расчётом<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Одно завышенное обещание — и эксперт превращается в продавца. Доверие не вернуть.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #F4E5E0; background:#FCF6F4;\"><td style=\"padding:13px 18px; font-weight:700;\">Говорить «зелёная энергия, экология»<\/td><td style=\"padding:13px 18px; color:#5E5550;\">Для ЛПР это шум. Он считает деньги. Говорим про актив и окупаемость.<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">2.4 — Как звучать уверенно<\/h3>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\"><b>Темп — медленнее, чем хочется.<\/b> Паузы — это сила. После вопроса замолчите и дайте клиенту ответить.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\"><b>Голос вниз в конце фразы.<\/b> Утверждение, а не вопрос. «Подготовлю расчёт.» — точка, не просьба о разрешении.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\"><b>Конкретика вместо воды.<\/b> Не «значительная экономия», а «по вашему счёту — порядка 8 миллионов тенге в год».<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\"><b>Имя клиента 2–3 раза за разговор<\/b> — но не чаще, иначе звучит как тренинг по продажам.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\"><b>Улыбка в голосе<\/b> на открытии и в закрытии. Её слышно даже по телефону.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART III ============ -->\n    <section id=\"p3\" class=\"bleed page-break keep\" data-screen-label=\"Часть III\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">III<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть третья<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Начало разговора<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Первые 15 секунд решают, будут ли следующие пять минут. Задача открытия — не представиться (это делают все), а дать клиенту повод не класть трубку. Ниже — рабочие варианты под разные ситуации, и к каждому объяснение, почему он работает.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:22px;\">\n      <!-- opening 3.1 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.1 — Входящий лид<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">тёплый контакт<\/span><\/div>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Здравствуйте, [Имя]! Меня зовут ___, Helio Solar. Спасибо, что оставили заявку. Удобно 5 минут? Я не буду предлагать стандартное решение — сначала пойму вашу задачу, и под неё мы сделаем расчёт именно по вашему объекту.»<\/p>\n          <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\/div><span style=\"color:#5E6066;\">Снимает страх «сейчас будут впаривать». Переворачивает ожидание.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\/div><span style=\"color:#5E6066;\">Облегчение и любопытство. Клиент готов говорить.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\/div><span style=\"color:#5E6066;\">Всегда на тёплом лиде — человек уже поднял руку.<\/span><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <!-- opening 3.2 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.2 — Холодный B2B: выход на ЛПР<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">через секретаря<\/span><\/div>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Добрый день! ___, компания Helio Solar. Мы помогаем предприятиям снижать расходы на электроэнергию до 70% за счёт собственной генерации — без остановки производства. Подскажите, кто у вас отвечает за снижение затрат на энергоресурсы и инвестиционные проекты?»<\/p>\n          <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\/div><span style=\"color:#5E6066;\">Первая фраза — сразу выгода и цифра, а не «мы занимаемся СЭС».<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\/div><span style=\"color:#5E6066;\">Деловой интерес. «До 70%» — крючок для любого, кто отвечает за затраты.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\/div><span style=\"color:#5E6066;\">Первый холодный контакт, когда ЛПР ещё неизвестен.<\/span><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <!-- opening 3.3 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.3 — Открытие через боль<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">прохладный контакт<\/span><\/div>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Можно один вопрос? Если стоимость электроэнергии за пару лет вырастет ещё на 30–40% — как это отразится на себестоимости вашей продукции? Именно эту задачу сегодня решают наши клиенты.»<\/p>\n          <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\/div><span style=\"color:#5E6066;\">Вопрос, на который нельзя ответить «нет». Клиент сам проговаривает проблему.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\/div><span style=\"color:#5E6066;\">Лёгкая тревога + интерес. Тревога мобилизует внимание.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\/div><span style=\"color:#5E6066;\">Производство и агро, где доля энергии в себестоимости высока.<\/span><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <!-- opening 3.4 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#2A2660;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#F7A93C;\">3.4 — Премиальное открытие<\/span><span style=\"font-size:12px; color:#BDB9DC; font-weight:700;\">крупный B2B<\/span><\/div>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #2A2660; padding-left:18px;\">«Добрый день! Мы не продаём солнечные панели. Мы создаём для предприятий собственный источник дешёвой электроэнергии на 25–30 лет вперёд. После нашего расчёта руководители обычно видят, сколько миллионов тенге в год можно оставлять внутри компании вместо оплаты растущих тарифов. Если найдётся 20 минут — покажем это на ваших цифрах.»<\/p>\n          <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\/div><span style=\"color:#5E6066;\">«Мы не продаём панели» обезоруживает. Дальше — масштаб под уровень собеседника.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\/div><span style=\"color:#5E6066;\">Уважение. С ЛПР говорят на его языке — деньги и горизонт.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Когда<\/div><span style=\"color:#5E6066;\">Собственник, ген.директор, крупный объект.<\/span><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <!-- opening 3.5 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#D87D08;\">3.5 — Частный дом<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">B2C<\/span><\/div>\n        <div style=\"padding:24px 26px;\">\n          <p style=\"margin:0 0 18px; font-size:17px; line-height:1.5; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:18px;\">«Здравствуйте! Я не буду продавать панели. Хочу показать, во что вам обойдётся электричество к 2030 году при нынешнем росте тарифов — и как это можно зафиксировать уже сейчас. Это 5 минут, и без обязательств. Удобно?»<\/p>\n          <div class=\"mscroll\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; font-size:13.5px;\">\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Почему работает<\/div><span style=\"color:#5E6066;\">Апеллирует к бытовой тревоге — росту счетов — и сразу обещает решение без обязательств.<\/span><\/div>\n            <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:4px;\">Эмоция<\/div><span style=\"color:#5E6066;\">«Это про меня». Частник думает о семье и бюджете, а не об инвестициях.<\/span><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART IV ============ -->\n    <section id=\"p4\" class=\"bleed page-break keep\" data-screen-label=\"Часть IV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">IV<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть четвёртая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Установление доверия<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Доверие — это валюта, на которую покупается право задавать неудобные вопросы и называть цену. Без доверия любой расчёт воспринимается как «развод». Оно строится не комплиментами, а поведением. Пять рычагов, которые работают на рынке Казахстана.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:14px;\">\n      <div class=\"keep mstack-num\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">01<\/div>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Принцип взаимности<\/div><p style=\"margin:0 0 12px; color:#33343B;\">Сначала дай — потом проси. Бесплатный расчёт, аудит, честная оценка «вам это сейчас невыгодно» создают у клиента ощущение долга. Человек, которому помогли бесплатно, склонен ответить взаимностью.<\/p><div style=\"background:#FBF4E9; border-radius:9px; padding:12px 16px; font-size:14px; font-style:italic; color:#6A5A3E;\"><b style=\"font-style:normal; color:#B0750C; font-size:11px; letter-spacing:.1em; text-transform:uppercase; display:block; margin-bottom:4px;\">Фраза-рычаг<\/b>«Расчёт ничего не стоит и ни к чему не обязывает. Если цифры покажут, что проект сейчас невыгоден — я честно скажу, и вы сэкономите время.»<\/div><\/div>\n      <\/div>\n      <div class=\"keep mstack-num\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">02<\/div>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Принцип авторитета<\/div><p style=\"margin:0 0 12px; color:#33343B;\">Авторитет показывают, а не заявляют. «Мы лучшие» не работает. Работают факты: реализованные объекты, опыт с отраслью, цифры из похожих проектов, сертификаты ISO, гарантия 25 лет, финансирование через лизинговых партнёров.<\/p>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\"><div style=\"background:#F6F3EC; border-radius:9px; padding:12px 16px; font-size:13.5px; color:#5E6066;\"><b style=\"color:#2A2660;\">B2B:<\/b> «Есть похожий объект — склад на N тыс. м². Пришлю анонимизированный расчёт, чтобы вы увидели порядок цифр.»<\/div><div style=\"background:#F6F3EC; border-radius:9px; padding:12px 16px; font-size:13.5px; color:#5E6066;\"><b style=\"color:#2A2660;\">Агро:<\/b> «Делали ТЭО под поливные хозяйства в вашем регионе, с учётом сезонности насосов. Это не шаблон.»<\/div><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"keep mstack-num\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">03<\/div>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Симпатия и раппорт<\/div><p style=\"margin:0; color:#33343B;\">Люди покупают у тех, кто на них похож и кто их слышит. Раппорт — это подстройка под темп и манеру: говорит медленно — сбавьте; говорит цифрами — отвечайте цифрами. ЛПР говорит «OPEX» — говорите «OPEX»; фермер говорит «соляра» — не поправляйте. Маленькое личное наблюдение в начале сближает быстрее любого скрипта.<\/p><\/div>\n      <\/div>\n      <div class=\"keep mstack-num\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">04<\/div>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Активное слушание<\/div><p style=\"margin:0 0 12px; color:#33343B;\">Самый недооценённый навык. На этапе диагностики клиент говорит минимум 60% времени. Слушание — это не молчание, а возвращение клиенту его же слов:<\/p>\n          <div style=\"display:grid; gap:8px; font-size:13.5px;\"><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Эхо<\/b><span style=\"color:#5E6066; flex:1;\">«То есть летом счёт доходит до трёх миллионов — правильно понимаю?»<\/span><\/div><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Уточнение<\/b><span style=\"color:#5E6066; flex:1;\">«А что для вас самое больное — сама сумма или её непредсказуемость?»<\/span><\/div><div style=\"display:flex; gap:12px;\"><b style=\"color:#D87D08; flex:none;\">Резюме<\/b><span style=\"color:#5E6066; flex:1;\">«Если суммировать: важно зафиксировать стоимость и убрать зависимость от сети. Верно?»<\/span><\/div><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"keep mstack-num\" style=\"display:grid; grid-template-columns:54px 1fr; gap:22px; border:1px solid #E7E2D7; border-radius:13px; padding:24px 26px;\">\n        <div style=\"font-size:34px; font-weight:800; color:#F0E6D2; line-height:1;\">05<\/div>\n        <div><div style=\"font-weight:800; font-size:17px; margin-bottom:6px;\">Эмоциональное отражение<\/div><p style=\"margin:0; color:#33343B;\">Назвать эмоцию клиента вслух — значит снять её напряжение. «Понимаю, вы наверняка уже сталкивались с подрядчиками, которые наобещали и пропали» — и клиент расслабляется, потому что его опасение признали. Работает особенно сильно с настороженными и обжёгшимися клиентами.<\/p><\/div>\n      <\/div>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:flex-start; margin-top:8px; padding:22px 26px; background:#F2F1FA; border-radius:12px;\">\n        <div style=\"flex:none; width:40px; height:40px; border-radius:50%; background:#2A2660; color:#fff; display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:800;\">!<\/div>\n        <div><div style=\"font-weight:800; color:#2A2660; margin-bottom:4px;\">Главное правило доверия<\/div><p style=\"margin:0; color:#3A3A55;\">Ни одного обещания, которое нельзя подтвердить расчётом или документом. Доверие строится месяцами и рушится одной завышенной цифрой.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART V ============ -->\n    <section id=\"p5\" class=\"bleed page-break keep\" data-screen-label=\"Часть V\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">V<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть пятая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Выявление потребностей по SPIN<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">SPIN — это не допрос, а лестница. Четыре типа вопросов ведут клиента от фактов к осознанию проблемы, от проблемы к её цене и от цены к желанию решить. Вывод клиент делает сам — а к собственным выводам не возражают. Порядок строгий: нельзя перепрыгивать к презентации, не пройдя Implication.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 36px;\">\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#EFE9F3; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#7A76B0;\">S<\/div>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Situation — ситуационные вопросы<\/div><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Собираем факты. Коротко и по делу — не самая интересная часть, не затягиваем.<\/div><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Какой примерно ежемесячный счёт за электроэнергию? А в пиковые месяцы?<\/li><li>Объект в собственности или в аренде? Какая площадь крыши / территории свободна?<\/li><li>Потребление в основном днём или круглосуточно?<\/li><li>Кто, кроме вас, участвует в принятии таких решений?<\/li><\/ul><\/div>\n        <\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#E7DFEE; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#6A5AA0;\">P<\/div>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Problem — проблемные вопросы<\/div><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Вскрываем боль. Здесь клиент впервые проговаривает, что его не устраивает.<\/div><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Насколько вырос ваш счёт за последние два года?<\/li><li>Случались ли отключения, которые останавливали работу? Что это стоило?<\/li><li>Насколько предсказуема энергостатья при планировании бюджета?<\/li><li>Доля энергии в себестоимости устраивает или уже мешает конкурировать по цене?<\/li><\/ul><\/div>\n        <\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:2px solid #F7941D; box-shadow:0 8px 26px rgba(247,148,29,.16);\">\n          <div style=\"background:linear-gradient(180deg,#F7941D,#FBB040); display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#fff;\">I<\/div>\n          <div style=\"padding:20px 24px;\"><div style=\"display:flex; align-items:center; gap:10px; margin-bottom:3px;\"><div style=\"font-weight:800; font-size:16px;\">Implication — извлекающие вопросы<\/div><span style=\"background:#FBF0DD; color:#B0750C; font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; border-radius:5px;\">ядро метода<\/span><\/div><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Здесь проблема превращается в деньги и риски. Клиент должен почувствовать, что бездействие стоит дороже решения.<\/div><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Если тариф вырастет ещё на 30–40% за пару лет — что произойдёт с вашей маржой?<\/li><li>Сколько вы уже переплатили за время, что откладываете решение? Давайте прикинем.<\/li><li>Если конкурент зафиксирует себестоимость энергии на 25 лет, а вы — нет, кто выиграет тендер по цене?<\/li><li>Во что обходится один день простоя при отключении — выручка, штрафы, сырьё?<\/li><\/ul><\/div>\n        <\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:64px 1fr; border-radius:13px; overflow:hidden; border:1px solid #E7E2D7;\">\n          <div style=\"background:#E5EFE9; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:#2E8059;\">N<\/div>\n          <div style=\"padding:20px 24px;\"><div style=\"font-weight:800; font-size:16px; margin-bottom:3px;\">Need-payoff — направляющие вопросы<\/div><div style=\"font-size:13px; color:#9A9488; margin-bottom:12px;\">Разворачиваем клиента к решению. Он сам формулирует ценность — и фактически продаёт себе.<\/div><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Если бы стоимость электричества была зафиксирована на 25 лет — насколько спокойнее планировать бюджет?<\/li><li>Что бы дало снижение энергозатрат на 60–70% — куда направили бы высвободившиеся деньги?<\/li><li>Насколько полезно показать партнёрам и банку ESG-документы по углеродному следу?<\/li><\/ul><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin-top:20px; padding:20px 26px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\">\n        <div style=\"font-size:30px; font-weight:800; color:#D87D08; flex:none;\">60/40<\/div>\n        <p style=\"margin:0; color:#5A4A2C;\"><b style=\"color:#3A3010;\">Правило 60/40.<\/b> На этом этапе клиент говорит 60% времени, менеджер — 40%. Если наоборот — вы презентуете вслепую и почти наверняка промахнётесь мимо настоящей боли.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART VI ============ -->\n    <section id=\"p6\" class=\"bleed page-break keep\" data-screen-label=\"Часть VI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">VI<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть шестая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Диагностика клиента<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Пока клиент отвечает на SPIN-вопросы, менеджер параллельно ставит «диагноз» — кто перед ним и насколько горяч. От этого зависит вся дальнейшая тактика. Ниже — рабочая шкала, которую заполняют прямо в CRM по ходу разговора.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">6.1 — Тип личности и как с ним говорить<\/h3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:24%;\">Тип<\/th><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Как распознать<\/th><th style=\"padding:13px 18px; font-weight:700;\">Как продавать<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Аналитик<br><span style=\"font-size:11px; color:#9A9488;\">финдир, гл. энергетик<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Просит цифры, задаёт уточняющие вопросы, осторожен<\/td><td style=\"padding:13px 18px; color:#33343B;\">P&amp;L-модель, IRR/NPV, расчёт чувствительности. Не давите эмоцией.<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; fo
