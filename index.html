 текущие цены оборудования, льготная ставка, график монтажа. Никогда не выдумывайте дефицит — поймают, и доверие рухнет.<\/p><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.7<\/span><div style=\"font-weight:800; font-size:16px;\">Последовательность<\/div><\/div><p style=\"margin:0; font-size:14px; color:#33343B;\">Человек стремится быть согласованным со своими словами. Если на SPIN клиент признал, что энергозатраты — проблема, напоминаем: «вы сами сказали, что это бьёт по марже — логично закрыть вопрос, пока тариф не вырос».<\/p><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.8<\/span><div style=\"font-weight:800; font-size:16px;\">Storytelling<\/div><\/div><p style=\"margin:0 0 10px; font-size:14px; color:#33343B;\">История запоминается в 20 раз лучше списка фактов. Короткий рассказ о реальном клиенте продаёт сильнее любой таблицы.<\/p><div style=\"background:#F6F3EC; border-radius:8px; padding:12px 14px; font-size:13px; font-style:italic; color:#5E6066;\">«Один владелец отеля так же сомневался. Через год вернулся: тариф вырос, счёт ещё больше. Поставил станцию, теперь жалеет лишь о том, что не сделал это раньше.»<\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; padding:22px 24px; grid-column:1 / -1;\"><div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:8px;\"><span style=\"font-size:13px; font-weight:800; color:#D87D08;\">9.9<\/span><div style=\"font-weight:800; font-size:16px;\">Авторитет<\/div><\/div><p style=\"margin:0; font-size:14px; color:#33343B;\">Сертификаты, реализованные мегаватты, опыт с отраслью, гарантия 25 лет, партнёрство с лизинговыми и финансовыми институтами. Авторитет не декларируют — его показывают документами.<\/p><\/div>\n    <\/section>\n\n    <!-- ============ PART X ============ -->\n    <section id=\"p10\" class=\"bleed page-break keep\" data-screen-label=\"Часть X\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">X<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть десятая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Закрытие сделки<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Закрытие — не отдельный финальный рывок, а естественное продолжение разговора, где боль выявлена и ценность показана. Если клиент дошёл сюда подготовленным, закрытие — это вопрос «как», а не «да или нет». Десять рабочих техник.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px; display:grid; gap:12px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">1<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие на следующий шаг<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">базовая, первый контакт<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Наш инженер подготовит персональный расчёт — мощность, стоимость, экономия, окупаемость и финансирование. Это бесплатно. Когда удобнее обсудить — завтра после обеда или в первой половине дня?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> почти отсутствует. Главное — не пропустить close в конце разговора.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">2<\/span><span style=\"font-weight:800; font-size:16px;\">Альтернативное закрытие<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">выбор без выбора<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Вам удобнее, чтобы инженер выехал в четверг или в пятницу?» / «Оформляем в лизинг или рассматриваете покупку?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> с холодным клиентом воспринимается как давление. Применять только после согласия в принципе.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">3<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие через резюме выгод<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">после презентации<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Итак: фиксируем стоимость электричества, окупаемость 2–4 года, монтаж без остановки работы, документы и сервис на нас. Остаётся выбрать дату старта. Подготовлю договор?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> если резюме включает невыясненные выгоды — клиент почувствует фальшь. Резюмируйте только обсуждённое.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">4<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие через упущенную выгоду<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">клиент тянет<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Каждый месяц на старом тарифе — это [сумма] мимо вас. Пока готовим проект, вы переплачиваете. Чем раньше старт — тем раньше станция возвращает деньги. Запускаем?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> не передавите — должно звучать как забота о деньгах клиента, а не пугалка.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">5<\/span><span style=\"font-weight:800; font-size:16px;\">Пробное закрытие (тест-вопрос)<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">замер температуры<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Если представить, что цифры в расчёте вас устроят — вы готовы стартовать в этом квартале или есть что-то, что нужно решить заранее?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> ответ может вскрыть скрытое возражение — это хорошо, отрабатывайте его.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">6<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие на финансировании<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">барьер — деньги<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Если убрать вопрос капекса — лизинг с авансом от 15%, платёж из экономии — что-то ещё мешает начать? Тогда подам заявку на расчёт лизинга параллельно с проектом.»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> не предлагайте лизинг как «средство от безденежья» — это позиционирование актива.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">7<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие через пилот<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">промышленность<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Не будем сразу замахиваться на весь периметр. Запустим пилот на одной площадке, соберём фактические цифры выработки, и уже с ними пойдёте к совету. Какую площадку возьмём?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> пилот должен быть экономически осмысленным, иначе цифры разочаруют.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">8<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие «по-честному» (reverse)<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">недоверчивый клиент<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Я не буду уговаривать. Сделаем расчёт — если он покажет, что невыгодно, я первый скажу, и мы расстанемся друзьями. Но если выгодно — обещайте рассмотреть всерьёз. Договорились?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> работает только если вы готовы сказать «невыгодно». Иначе это манипуляция, и её считывают.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">9<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие с дедлайном<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">честный дефицит<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Специальная лизинговая ставка действует с условиями по сроку, а монтаж на этот сезон мы расписываем сейчас. Чтобы успеть в окно, заявку стоит подать на этой неделе. Подготовить?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> только реальные дедлайны. Выдуманный дефицит ведёт к потере доверия.<\/div><\/div><\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">10<\/span><span style=\"font-weight:800; font-size:16px;\">Закрытие на согласовании с ЛПР<\/span><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">не финальное лицо<\/span><\/div><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Подготовлю расчёт так, чтобы его удобно было показать [собственнику / совету] — с экономикой и финмоделью. И предлагаю короткую встречу втроём, чтобы я ответил на вопросы сразу. Когда ему удобно?»<\/p><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\/b> не перепрыгивайте через контактное лицо — сделайте его союзником.<\/div><\/div><\/div>\n    <\/section>\n    <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin:8px 0 36px; padding:22px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\">\n      <div style=\"flex:none; width:46px; height:46px; border-radius:50%; border:2px solid #F7A93C; display:flex; align-items:center; justify-content:center; gap:4px;\"><span style=\"width:4px; height:18px; background:#F7A93C; border-radius:2px;\"><\/span><span style=\"width:4px; height:18px; background:#F7A93C; border-radius:2px;\"><\/span><\/div>\n      <p style=\"margin:0; font-size:16px;\"><b>После любого закрытия — замолчите.<\/b> Кто заговорит первым после закрывающего вопроса, тот «проигрывает». Задали вопрос — держите паузу, дайте клиенту ответить.<\/p>\n    <\/div>\n\n    <!-- ============ PART XI ============ -->\n    <section id=\"p11\" class=\"bleed page-break keep\" data-screen-label=\"Часть XI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XI<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть одиннадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Если клиент не готов купить<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">«Нет сейчас» почти никогда не значит «нет навсегда». Длинные циклы сделки (агро 3–9 месяцев, промышленность 6–18) — это норма. Задача — не потерять контакт и остаться рядом до момента, когда клиент созреет. Кто будет на связи в нужный момент, тот и получит сделку.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.1 — Сохранение отношений<\/h3>\n      <div style=\"display:grid; gap:10px; margin-bottom:8px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\">Завершите разговор тепло, без обиды и давления: «Понимаю, сейчас не время. Я на связи — обращайтесь, когда будет актуально.»<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\">Зафиксируйте в CRM причину «не сейчас» и предполагаемое окно решения (после урожая, новый бюджетный год, окончание стройки).<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\/span><p style=\"margin:0;\">Оставьте у клиента ценное: расчёт по объекту, который не устаревает. Это якорь, к которому он вернётся.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.2 — Система догрева (касания)<\/h3>\n      <p style=\"margin:0 0 18px; color:#33343B;\">Догрев — это не «напоминания о себе», а серия полезных касаний, каждое что-то даёт клиенту. Ритм — раз в 3–4 недели.<\/p>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:22%;\">Касание<\/th><th style=\"padding:13px 18px; font-weight:700;\">Что отправляем<\/th><th style=\"padding:13px 18px; font-weight:700; width:30%;\">Зачем<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">1 — сразу<\/td><td style=\"padding:13px 18px; color:#33343B;\">Расчёт по объекту + короткое резюме<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Оставить ценность на руках<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">2 — через 3–4 нед.<\/td><td style=\"padding:13px 18px; color:#33343B;\">Кейс из его отрасли / региона<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Социальное доказательство<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">3<\/td><td style=\"padding:13px 18px; color:#33343B;\">Новость о росте тарифов / изменении в законе<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Усилить боль фактом, не своими словами<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">4<\/td><td style=\"padding:13px 18px; color:#33343B;\">Гайд: финансирование / субсидии / лизинг<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Снять барьер капекса<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">5<\/td><td style=\"padding:13px 18px; color:#33343B;\">Личный вопрос: «как продвигается вопрос с энергией?»<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Проверить готовность, мягко вернуть к решению<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.3 — Повторный контакт<\/h3>\n      <p style=\"margin:0 0 14px; color:#33343B;\">Когда наступает зафиксированное окно — возвращаемся не с «ну что, надумали?», а с поводом:<\/p>\n      <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 24px; border-left:3px solid #F7941D; font-style:italic; color:#33343B;\">«[Имя], помните, мы считали станцию для вашего объекта весной? С тех пор тариф для юрлиц подрос, и ваша экономия по новому расчёту стала ещё заметнее. Обновил цифры — переслать? И, если актуально, наметим встречу.»<\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">11.4 — Чего не делать<\/h3>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\/span><p style=\"margin:0;\">Не звонить «просто узнать, как дела» без повода — это раздражает.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\/span><p style=\"margin:0;\">Не давить и не упрекать («вы же обещали подумать») — упрёк закрывает дверь.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\/span><p style=\"margin:0;\">Не пропадать совсем — молчание полгода = клиент ушёл к тому, кто был на связи.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART XII ============ -->\n    <section id=\"p12\" class=\"bleed page-break keep\" data-screen-label=\"Часть XII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XII<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть двенадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Работа с эмоциями<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Решение о покупке принимается эмоцией и оправдывается логикой. Менеджер, который слышит эмоцию за словами, ведёт сделку; кто слышит только слова — обрабатывает заявки. Карта эмоций по этапам разговора.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:18%;\">Этап<\/th><th style=\"padding:13px 18px; font-weight:700;\">Что чувствует / чего боится<\/th><th style=\"padding:13px 18px; font-weight:700; width:36%;\">Что хочет услышать<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Открытие<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Настороженность: «сейчас будут впаривать»<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Я не продаю — я считаю и помогаю разобраться»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Диагностика<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Облегчение, что его слушают<\/td><td style=\"padding:13px 18px; color:#33343B;\">Вопросы про его ситуацию, а не монолог о панелях<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Цена<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Тревога: «потяну ли, не переплачу ли»<\/td><td style=\"padding:13px 18px; color:#33343B;\">Окупаемость, лизинг, «актив, а не расход»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Сомнение<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Страх ошибки и плохого подрядчика<\/td><td style=\"padding:13px 18px; color:#33343B;\">Гарантии, SLA, кейсы, «скажем честно, если невыгодно»<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Решение<\/td><td style=\"padding:13px 18px; color:#5E6066;\">Боязнь поторопиться<\/td><td style=\"padding:13px 18px; color:#33343B;\">«Это обратимо, начнём с расчёта/пилота, без обязательств»<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <div class=\"mscroll mscroll-wide\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #D7EADF;\"><div style=\"background:#EEF6F1; padding:14px 20px; display:flex; gap:8px; align-items:center;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\/span><span style=\"font-weight:800; color:#1B7A4F; font-size:13px; letter-spacing:.1em; text-transform:uppercase;\">12.1 — Повышают доверие<\/span><\/div><div style=\"padding:18px 20px; font-size:14px; line-height:1.8; color:#27402F;\">Актив · окупаемость · экономика · расчёт по вашему объекту · гарантия · честно скажем · фиксируем стоимость · без обязательств · единый подрядчик · полный цикл · под вашу задачу.<\/div><\/div>\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #F0DAD3;\"><div style=\"background:#FBEEEB; padding:14px 20px; display:flex; gap:8px; align-items:center;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><span style=\"font-weight:800; color:#B8412F; font-size:13px; letter-spacing:.1em; text-transform:uppercase;\">12.2 — Снижают доверие<\/span><\/div><div style=\"padding:18px 20px; font-size:14px; line-height:1.8; color:#5E3B34;\">«Дёшево» · «акция» · «успейте» · «всего лишь» · «поверьте мне» · «100% без рисков» · «зелёная энергия для планеты» · «гарантирую прибыль».<\/div><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">12.3 — Чего нельзя говорить никогда<\/h3>\n      <div class=\"mcol-1\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><p style=\"margin:0; font-size:14px;\">Завышенных цифр экономии «чтобы зацепить» — поймают на расчёте.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><p style=\"margin:0; font-size:14px;\">«Все так делают» вместо аргумента — это не довод, а давление.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><p style=\"margin:0; font-size:14px;\">Плохо о конкурентах поимённо — роняет нас, а не их.<\/p><\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\/span><p style=\"margin:0; font-size:14px;\">«Гарантирую, что окупится за год» — обещание, за которое потом отвечать.<\/p><\/div>\n      <\/div>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin-top:20px; padding:22px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\">\n        <div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#F7A93C; font-weight:800; flex:none; writing-mode:vertical-rl; transform:rotate(180deg);\">Цель<\/div>\n        <p style=\"margin:0; font-size:16px;\">Клиент должен повесить трубку с чувством «наконец-то кто-то посчитал честно и не давил». Это чувство продаёт сильнее любой цифры — и приводит рекомендации.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART XIII ============ -->\n    <section id=\"p13\" class=\"bleed page-break keep\" data-screen-label=\"Часть XIII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XIII<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть тринадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Анализ разговора и вероятность сделки<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">После каждого ключевого этапа менеджер выставляет вероятность сделки (лучше — в CRM) и понимает, что делать, если она падает. Это превращает интуицию в управляемый процесс.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">13.1 — Контрольные точки и нормативная вероятность<\/h3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <div class=\"table-scroll\" style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Этап пройден<\/th><th style=\"padding:13px 18px; font-weight:700; width:16%;\">Вероятность<\/th><th style=\"padding:13px 18px; font-weight:700;\">Если ниже — что делать<\/th><\/tr><\/thead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Клиент согласился говорить<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#EFE9F3; color:#6A5AA0; font-weight:800; padding:3px 10px; border-radius:6px;\">10–20%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Вернуться к выгоде в первой фразе, не к продукту<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Названа боль в деньгах<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#EFE9F3; color:#6A5AA0; font-weight:800; padding:3px 10px; border-radius:6px;\">25–40%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Углубить Implication-вопросы, нащупать настоящую боль<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Связки попали в боль<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#FBF0DD; color:#B0750C; font-weight:800; padding:3px 10px; border-radius:6px;\">40–55%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Проверить, ту ли боль закрываете; задать тест-вопрос<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Возражения сняты<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#FBF0DD; color:#B0750C; font-weight:800; padding:3px 10px; border-radius:6px;\">55–70%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Не закрыто ключевое возражение — вернуться и разобрать<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Согласие на расчёт/встречу<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#EEF6F1; color:#1B7A4F; font-weight:800; padding:3px 10px; border-radius:6px;\">70–85%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Зафиксировать дату; без даты вероятность падает вдвое<\/td><\/tr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Согласован договор/финансирование<\/td><td style=\"padding:13px 18px;\"><span style=\"background:#EEF6F1; color:#1B7A4F; font-weight:800; padding:3px 10px; border-radius:6px;\">85–95%<\/span><\/td><td style=\"padding:13px 18px; color:#5E6066;\">Ускорить документы, держать темп, не «остывать»<\/td><\/tr>\n          <\/tbody>\n        <\/table>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:18px 0 36px;\">\n      <div class=\"mscroll mscroll-wide\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; padding:22px 24px;\"><h3 style=\"font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">13.2 — Сигналы, что вероятность падает<\/h3><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Клиент перестал задавать вопросы, отвечает односложно — вернитесь к его боли.<\/li><li>«Пришлите на почту» без уточнений — удержите вопросом про цифры объекта.<\/li><li>Появился третий человек «которому надо показать» — выясните DMU, сделайте контакт союзником.<\/li><li>Разговор ушёл в цену до показа ценности — остановитесь, вернитесь к экономике.<\/li><\/ul><\/div>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; padding:22px 24px;\"><h3 style=\"font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#1B7A4F; font-weight:800; margin-bottom:14px;\">13.3 — Как поднять падающую вероятность<\/h3><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Прямой вопрос: «что должно произойти, чтобы это стало для вас решённым делом?»<\/li><li>Снизьте порог: не вся станция, а пилот; не покупка, а лизинг; не решение, а расчёт.<\/li><li>Усильте боль фактом извне (рост тарифа, кейс конкурента), а не давлением.<\/li><li>Зафиксируйте микро-договорённость — любой следующий конкретный шаг с датой.<\/li><\/ul><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART XIV ============ -->\n    <section id=\"p14\" class=\"bleed page-break keep\" data-screen-label=\"Часть XIV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XIV<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть четырнадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Три версии скрипта<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Один и тот же продукт продаётся разным людям по-разному. Три тональности под три типа собеседника. Менеджер выбирает версию по сегменту и характеру клиента, считанному на диагностике.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:16px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#EFE9F3; padding:18px 26px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px; color:#4A4490;\">14.1 — Экспертная версия<\/div><div style=\"font-size:12px; color:#7A76B0; font-weight:700;\">аналитик · финдиректор · техдиректор<\/div><\/div><p style=\"margin:6px 0 0; font-size:13.5px; color:#6A66A0;\">Сухо, цифрами, без эмоций. Собеседник доверяет данным, а не энтузиазму.<\/p><\/div>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\/div><p style=\"margin:0; color:#33343B;\">«Добрый день. Helio Solar. Готов прислать P&amp;L-модель окупаемости станции под ваш фактический счёт — с IRR, NPV и сроком окупаемости. Расчёт бесплатный. Куда удобнее — на почту или WhatsApp?»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\/div><p style=\"margin:0; color:#33343B;\">«LCOE проекта — порядка 17 тенге за кВт·ч против сетевых 49. На горизонте 25 лет это NPV в плюс и IRR около 22%. Это инвестиционное решение, а не покупка оборудования.»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\/div><p style=\"margin:0; color:#33343B;\">«Подготовлю модель под ваши цифры. Когда удобно разобрать её — вторник или среда?»<\/p><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#EEF6F1; padding:18px 26px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px; color:#1B7A4F;\">14.2 — Дружелюбная версия<\/div><div style=\"font-size:12px; color:#3E8C66; font-weight:700;\">частник · малый бизнес<\/div><\/div><p style=\"margin:6px 0 0; font-size:13.5px; color:#3E8C66;\">Тепло, на бытовом языке, через семью и спокойствие. Никаких «инверторов» и «IRR».<\/p><\/div>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\/div><p style=\"margin:0; color:#33343B;\">«Здравствуйте! Спасибо, что оставили заявку. Я не буду грузить техникой — давайте просто посмотрим, сколько вы платите за свет и сколько могли бы. Это пять минут и ни к чему не обязывает, хорошо?»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\/div><p style=\"margin:0; color:#33343B;\">«Представьте: зимой у соседей свет отключили, а у вас тёплый пол и кофе как ни в чём не бывало. И счёт при этом не растёт — он зафиксирован на годы вперёд. Дом потихоньку начинает работать на вас.»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\/div><p style=\"margin:0; color:#33343B;\">«Давайте наш инженер посчитает именно по вашему дому — бесплатно. Завтра днём или вечером удобнее обсудить?»<\/p><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"keep\" style=\"border:2px solid #2A2660; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:linear-gradient(120deg,#2E2A66,#3A3680); padding:18px 26px; color:#fff;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px;\">14.3 — Премиальная версия<\/div><div style=\"font-size:12px; color:#BDB9DC; font-weight:700;\">собственник · крупный B2B · C-level<\/div><\/div><p style=\"margin:6px 0 0; font-size:13.5px; color:#CFCCE6;\">Уверенно, масштабно, на равных. О стратегии и горизонте, а не о цене за киловатт.<\/p><\/div>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\/div><p style=\"margin:0; color:#33343B;\">«Добрый день. Мы не продаём панели — мы создаём для предприятий собственный источник дешёвой энергии на 25–30 лет. После расчёта руководители видят, сколько миллионов в год можно оставлять внутри компании. Найдётся 20 минут — покажу на ваших цифрах.»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\/div><p style=\"margin:0; color:#33343B;\">«Это вопрос энергетической стратегии на десятилетие: фиксируете себестоимость энергии, получаете ESG-соответствие для партнёров и банков, опережаете отрасль. Экономика лучше депозита и работает каждый день.»<\/p><\/div>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\/div><p style=\"margin:0; color:#33343B;\">«Предлагаю короткую встречу с расчётом под ваш объект. Вам удобнее у вас или у нас, в начале или в конце недели?»<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ============ PART XV ============ -->\n    <section id=\"p15\" class=\"bleed page-break keep\" data-screen-label=\"Часть XV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XV<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть пятнадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Готовые скрипты<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Полные сценарии для повседневной работы — обработка входящего лида и холодный B2B-аутрич. Готово к применению дословно или с подстройкой под клиента.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:6px;\">15.1 — Обработка входящего лида<\/h3>\n      <p style=\"margin:0 0 22px; color:#33343B;\">Цель: не продать станцию по телефону, а понять задачу, вызвать доверие, квалифицировать лид и договориться о расчёте под объект.<\/p>\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">1<\/span><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Первые 30 секунд<\/div><p style=\"margin:0; color:#33343B;\">«Здравствуйте, [Имя]! Меня зовут ___, компания Helio Solar. Спасибо, что оставили заявку. Удобно уделить мне 5 минут? Я сначала пойму вашу задачу, чтобы не предлагать шаблон — а под неё мы сделаем расчёт именно по вашему объекту.»<\/p><\/div><\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">2<\/span><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Выявляем настоящую потребность<\/div><p style=\"margin:0 0 8px; color:#33343B;\">«Подскажите, что подтолкнуло оставить заявку именно сейчас — хотите снизить счёт за электричество, часто отключают свет, строите объект или думаете про выгодную инвестицию?»<\/p><p style=\"margin:0; font-size:13px; color:#9A8B6E; font-style:italic;\">→ Внимательно выслушать, не перебивать. Настоящая причина определит всю линию.<\/p><\/div><\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">3<\/span><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Изучаем объект<\/div><p style=\"margin:0; color:#33343B;\">«Расскажите немного об объекте: где находится, что это — предприятие, склад, магазин, дом? В собственности? Какой примерно счёт в месяц? Свет нужен в основном днём или круглосуточно?»<\/p><\/div><\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">4<\/span><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Показываем экспертность<\/div><p style=\"margin:0; color:#33343B;\">«Спасибо, уже по ответам видно, что можно сделать хороший расчёт. Мы не предлагаем шаблон — сначала считаем, насколько проект выгоден именно вам: экономия, срок окупаемости и какое решение подойдёт лучше всего.»<\/p><\/div><\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">5<\/span><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Квалификация (для бизнеса)<\/div><p style=\"margin:0; color:#33343B;\">«Ещё один вопрос: кто обычно принимает окончательное решение по таким проектам — вы, собственник или руководитель?»<\/p><\/div><\/div>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">6<\/span><div style=\"background:#F2F1FA; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px; color:#2A2660;\">Закрытие на следующий шаг<\/div><p style=\"margin:0; color:#33343B;\">«Следующий этап простой: инженер готовит персональный расчёт — мощность, ориентировочную стоимость, прогноз экономии, окупаемость и финансирование. Потом спокойно обсудим. Когда удобнее — завтра после обеда или в первой половине дня?»<\/p><\/div><\/div>\n      <\/div>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;\">\n        <div style=\"border:1px dashed #D8CFBE; border-radius:10px; padding:14px 18px;\"><div style=\"font-size:12px; font-weight:800; color:#D87D08; margin-bottom:5px;\">Если спрашивают цену<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">«Стоимость зависит от мощности, объекта и оборудования — поэтому сначала считаем, чтобы назвать точную цифру и сразу показать выгоду, а не пугать средней по рынку.»<\/p><\/div>\n        <div style=\"border:1px dashed #D8CFBE; border-radius:10px; padding:14px 18px;\"><div style=\"font-size:12px; font-weight:800; color:#D87D08; margin-bottom:5px;\">Если «просто интересуюсь»<\/div><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">«Это нормально — для того и нужен бесплатный расчёт. Получите реальные цифры по своему объекту и решите без всяких обязательств.»<\/p><\/div>\n      <\/div>\n      <div class=\"keep\" style=\"margin-top:16px; padding:20px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\"><div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:6px;\">Фраза-стандарт компании<\/div><p style=\"margin:0; font-size:16px; font-weight:600;\">«Наша задача — не продать вам станцию, а понять, принесёт ли она вашему объекту реальную выгоду. Если расчёт покажет, что сейчас нецелесообразно, мы честно об этом скажем.»<\/p><\/div>\n    <\/section>\n\n    <section style=\"padding:24px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:18px;\">15.2 — B2B-аутрич: холодные касания<\/h3>\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Зацепка для директора предприятия (звонок)<\/div><p style=\"margin:0; color:#33343B; font-style:italic;\">«Добрый день! ___, Helio Solar. Мы помогаем предприятиям снижать расходы на электроэнергию до 70% за счёт собственной генерации — без остановки производства. Подскажите, кто у вас отвечает за затраты на энергоресурсы и инвестиционные проекты?»<\/p><\/div>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Через инвестиционную логику<\/div><p style=\"margin:0; color:#33343B; font-style:italic;\">«Многие считают станцию расходом. На деле это актив, который начинает экономить с первого дня после запуска и работает больше 25 лет. Поэтому предприятия и переходят на собственную генерацию уже сейчас, пока тариф не вырос ещё.»<\/p><\/div>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Закрытие на встречу<\/div><p style=\"margin:0; color:#33343B; font-style:italic;\">«Не предлагаю решать сейчас. Предлагаю короткую встречу на 20–30 минут — покажем реализованные проекты, расчёт окупаемости и варианты финансирования через лизинг. После этого спокойно оцените, есть ли выгода для вашей компании.»<\/p><\/div>\n        <div class=\"keep\" style=\"border:1px solid #D8E4DD; border-radius:11px; overflow:hidden;\"><div style=\"background:#E7F0EA; padding:12px 22px; display:flex; align-items:center; gap:10px;\"><span style=\"width:24px; height:24px; border-radius:6px; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;\">W<\/span><span style=\"font-weight:800; font-size:14px; color:#1B7A4F;\">WhatsApp после звонка<\/span><\/div><div style=\"padding:18px 22px; color:#33343B;\"><p style=\"margin:0 0 10px;\">Добрый день! Как договаривались, коротко о Helio Solar — реализуем промышленные солнечные станции полного цикла (EPC) для предприятий Казахстана и Центральной Азии.<\/p><ul style=\"margin:0 0 10px; padding-left:18px; line-height:1.7; font-size:14px;\"><li>Снижение расходов на электроэнергию до 70%<\/li><li>Проекты от 50 кВт до сотен мегаватт<\/li><li>Финансирование через лизинг (для производства — ставка от 12,6%)<\/li><li>Проектирование, поставка, монтаж и сервис — в одних руках<\/li><\/ul><p style=\"margin:0;\">Подготовлю предварительный расчёт по вашему предприятию. Сбросите последний счёт за электричество и примерную площадь крыши?<\/p><\/div><\/div>\n      <\/div>\n      <div class=\"keep\" style=\"margin-top:16px; padding:20px 26px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\"><div style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#B0750C; font-weight:800; margin-bottom:6px;\">Главный принцип отдела продаж<\/div><p style=\"margin:0; font-size:16px; font-weight:600; color:#3A3010;\">Мы не продаём панели. Мы помогаем снижать расходы на электроэнергию, повышать прибыль и принимать выгодные инвестиционные решения.<\/p><\/div>\n    <\/section>\n\n    <!-- ============ PART XVI ============ -->\n    <section id=\"p16\" class=\"bleed page-break keep\" data-screen-label=\"Часть XVI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\/div>\n      <div style=\"margin-bottom:30px; padding-bottom:24px; border-bottom:1px solid rgba(255,255,255,.10);\">\n        <img src=\"aaaaaaaa-bbbb-cccc-dddd-000000000001\" alt=\"Helio Solar\" style=\"height:40px; display:block; opacity:.95;\">\n      <\/div>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XVI<\/div>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть шестнадцатая<\/div>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Десять смоделированных диалогов<\/h2>\n        <\/div>\n      <\/div>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Скрипт оживает только в диалоге. Десять разговоров под типовые ситуации. <b style=\"color:#F7A93C;\">М<\/b> — менеджер, <b style=\"color:#fff;\">К<\/b> — клиент, стрелкой отмечен разбор приёма.<\/p>\n    <\/section>\n\n    <section style=\"padding:42px 0 18px; display:grid; gap:22px;\">\n      <!-- D1 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 1 · Идеальный разговор<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">коммерция<\/span><\/div>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Добрый день, Арман! Helio Solar. Спасибо за заявку. Пять минут найдётся? Я сначала пойму задачу, потом посчитаем по вашему объекту.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Да, давайте. У меня склад, счёт за свет уже под два миллиона в месяц, дорого.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Два миллиона — серьёзно. А за последние пару лет насколько вырос?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Процентов на тридцать, наверное. И конца не видно.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот это как раз и фиксируется. Крыша большая, нагрузка дневная — почти идеальный случай. Станция превращает крышу в актив с окупаемостью 2–3 года, дальше 20 лет вы платите за свет в разы меньше. Капекс вынимать не нужно — лизинг, платёж идёт из самой экономии.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">А если посчитать конкретно по мне?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Для этого и звоню. Пришлёте последний счёт и площадь крыши — инженер сделает расчёт с окупаемостью и финмоделью. Обсудим в четверг или в пятницу?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Давайте в четверг.<\/div><\/div>\n        <\/div>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\/b> Боль названа в деньгах, ценность привязана к ней, капекс снят лизингом, закрытие альтернативное. <b style=\"color:#2A2660;\">Вероятность ~80%.<\/b><\/div>\n      <\/div>\n\n      <!-- D2 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 2 · Трудный клиент<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">всё подвергает сомнению<\/span><\/div>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Знаю я эти ваши панели, окупаемость рисуете красивую, а на деле обман.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Понимаю скепсис — обещаний на рынке много. Поэтому я ничего не рисую: дам расчёт по вашим цифрам и помесячную выработку с реального объекта в вашем регионе. Если по факту невыгодно — скажу прямо.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ну-ну. И зимой ваши панели не работают.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Зимой выработка ниже — это правда. Поэтому схема гибридная с НЕТТО: летом копите переработку в сеть, зимой снимаете. Покажу годовой баланс на объекте, который уже отработал зиму. Цифры вас и рассудят.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ладно, покажите свой расчёт. Только без сказок.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Без сказок — это мой формат. Сбросьте счёт и площадь, пришлю расчёт и тот самый годовой график.<\/div><\/div>\n        <\/div>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\/b> Скепсис не оспаривается, а признаётся; ответ — факты и проверяемые документы. Reverse-close «скажу прямо» снимает оборону.<\/div>\n      <\/div>\n\n      <!-- D3 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 3 · Агрессивный клиент<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">раздражён<\/span><\/div>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Сколько можно звонить?! Достали уже своими станциями!<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Извините за беспокойство, не хотел попасть не вовремя. Один вопрос и отпущу: вам вообще тема снижения счёта за электричество интересна или закрыть вопрос совсем?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Да некогда мне, у меня производство стоит из-за отключения!<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот как раз про это и могу быть полезен — отключения и есть то, что станция с резервом убирает. Давайте не буду грузить сейчас, скину короткое сообщение, посмотрите в спокойную минуту. Идёт?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ну скиньте, потом гляну.<\/div><\/div>\n        <\/div>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\/b> На агрессию — спокойствие и уважение к «некогда». Зацепка за реальную боль (простой из-за отключения), мягкий перенос в асинхрон.<\/div>\n      <\/div>\n\n      <!-- D4 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 4 · Сомневающийся клиент<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">боится прогадать<\/span><\/div>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вроде интересно, но боюсь прогадать. Вдруг не окупится.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Нормальный страх, решение не на один год. Давайте уберём гадание: сделаем расчёт по вашему фактическому счёту, с консервативным сценарием выработки. Увидите цифры — и решение будет на данных, а не на ощущениях.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">А если тариф вдруг упадёт и экономия пропадёт?<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">За последние годы тариф только рос, особенно для юрлиц. Но в расчёте заложу даже сценарий без роста — и там окупаемость всё равно остаётся. Если хотите, начнём с пилота, чтобы посмотреть факт.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Пилот — это уже спокойнее звучит.<\/div><\/div>\n        <\/div>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\/b> Сомнение снимается данными и снижением риска (консервативный сценарий + пилот). Клиент сам выбирает менее рискованный вход.<\/div>\n      <\/div>\n\n      <!-- D5 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 5 · Сравнивает с конкурентами<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">«дешевле у других»<\/span><\/div>\n y-content:center;\">М<\/span><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот в этом и суть. Пришлю сравнение по LCOE и гарантийным обязательствам — без имён, просто параметры. Сопоставите по-честному и увидите реальную картину на горизонте, а не только цену на старте.<\/div><\/div>\n        <\/div>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\/b> Не очерняем конкурента, переводим сравнение с цены установки на стоимость владения за 25 лет — поле, где мы сильнее.<\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:0 0 36px; display:grid; gap:22px;\">\n      <!-- D6 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 6 · Без бюджета на старте<\/span><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">нет свободных денег<\/span><\/div>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\/span><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Тема хорошая, но свободных денег сейчас нет.<\/div><\/div>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex;
