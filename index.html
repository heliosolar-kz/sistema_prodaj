2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть десятая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Закрытие сделки<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:680px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Закрытие — не отдельный финальный рывок, а естественное продолжение разговора, где боль выявлена и ценность показана. Если клиент дошёл сюда подготовленным, закрытие — это вопрос «как», а не «да или нет». Десять рабочих техник.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px; display:grid; gap:12px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">1<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие на следующий шаг<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">базовая, первый контакт<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Наш инженер подготовит персональный расчёт — мощность, стоимость, экономия, окупаемость и финансирование. Это бесплатно. Когда удобнее обсудить — завтра после обеда или в первой половине дня?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> почти отсутствует. Главное — не пропустить close в конце разговора.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">2<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Альтернативное закрытие<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">выбор без выбора<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Вам удобнее, чтобы инженер выехал в четверг или в пятницу?» \u002F «Оформляем в лизинг или рассматриваете покупку?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> с холодным клиентом воспринимается как давление. Применять только после согласия в принципе.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">3<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие через резюме выгод<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">после презентации<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Итак: фиксируем стоимость электричества, окупаемость 2–4 года, монтаж без остановки работы, документы и сервис на нас. Остаётся выбрать дату старта. Подготовлю договор?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> если резюме включает невыясненные выгоды — клиент почувствует фальшь. Резюмируйте только обсуждённое.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">4<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие через упущенную выгоду<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">клиент тянет<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Каждый месяц на старом тарифе — это [сумма] мимо вас. Пока готовим проект, вы переплачиваете. Чем раньше старт — тем раньше станция возвращает деньги. Запускаем?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> не передавите — должно звучать как забота о деньгах клиента, а не пугалка.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">5<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Пробное закрытие (тест-вопрос)<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">замер температуры<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Если представить, что цифры в расчёте вас устроят — вы готовы стартовать в этом квартале или есть что-то, что нужно решить заранее?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> ответ может вскрыть скрытое возражение — это хорошо, отрабатывайте его.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">6<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие на финансировании<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">барьер — деньги<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Если убрать вопрос капекса — лизинг с авансом от 15%, платёж из экономии — что-то ещё мешает начать? Тогда подам заявку на расчёт лизинга параллельно с проектом.»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> не предлагайте лизинг как «средство от безденежья» — это позиционирование актива.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">7<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие через пилот<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">промышленность<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Не будем сразу замахиваться на весь периметр. Запустим пилот на одной площадке, соберём фактические цифры выработки, и уже с ними пойдёте к совету. Какую площадку возьмём?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> пилот должен быть экономически осмысленным, иначе цифры разочаруют.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">8<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие «по-честному» (reverse)<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">недоверчивый клиент<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Я не буду уговаривать. Сделаем расчёт — если он покажет, что невыгодно, я первый скажу, и мы расстанемся друзьями. Но если выгодно — обещайте рассмотреть всерьёз. Договорились?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> работает только если вы готовы сказать «невыгодно». Иначе это манипуляция, и её считывают.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">9<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие с дедлайном<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">честный дефицит<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Специальная лизинговая ставка действует с условиями по сроку, а монтаж на этот сезон мы расписываем сейчас. Чтобы успеть в окно, заявку стоит подать на этой неделе. Подготовить?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> только реальные дедлайны. Выдуманный дефицит ведёт к потере доверия.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:13px; overflow:hidden;\"><div style=\"display:flex; gap:14px; align-items:center; padding:14px 22px; background:#F6F3EC;\"><span style=\"flex:none; width:30px; height:30px; border-radius:8px; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">10<\u002Fspan><span style=\"font-weight:800; font-size:16px;\">Закрытие на согласовании с ЛПР<\u002Fspan><span style=\"margin-left:auto; font-size:12px; color:#9A9488; font-weight:700;\">не финальное лицо<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px;\"><p style=\"margin:0 0 12px; font-style:italic; color:#2B2B31; border-left:3px solid #F7941D; padding-left:16px;\">«Подготовлю расчёт так, чтобы его удобно было показать [собственнику \u002F совету] — с экономикой и финмоделью. И предлагаю короткую встречу втроём, чтобы я ответил на вопросы сразу. Когда ему удобно?»<\u002Fp><div style=\"font-size:13px; color:#8A857B;\"><b style=\"color:#B8412F;\">Риск:<\u002Fb> не перепрыгивайте через контактное лицо — сделайте его союзником.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n    <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin:8px 0 36px; padding:22px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\">\n      <div style=\"flex:none; width:46px; height:46px; border-radius:50%; border:2px solid #F7A93C; display:flex; align-items:center; justify-content:center; gap:4px;\"><span style=\"width:4px; height:18px; background:#F7A93C; border-radius:2px;\"><\u002Fspan><span style=\"width:4px; height:18px; background:#F7A93C; border-radius:2px;\"><\u002Fspan><\u002Fdiv>\n      <p style=\"margin:0; font-size:16px;\"><b>После любого закрытия — замолчите.<\u002Fb> Кто заговорит первым после закрывающего вопроса, тот «проигрывает». Задали вопрос — держите паузу, дайте клиенту ответить.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ============ PART XI ============ -->\n    <section id=\"p11\" class=\"bleed page-break keep\" data-screen-label=\"Часть XI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XI<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть одиннадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Если клиент не готов купить<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">«Нет сейчас» почти никогда не значит «нет навсегда». Длинные циклы сделки (агро 3–9 месяцев, промышленность 6–18) — это норма. Задача — не потерять контакт и остаться рядом до момента, когда клиент созреет. Кто будет на связи в нужный момент, тот и получит сделку.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.1 — Сохранение отношений<\u002Fh3>\n      <div style=\"display:grid; gap:10px; margin-bottom:8px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\">Завершите разговор тепло, без обиды и давления: «Понимаю, сейчас не время. Я на связи — обращайтесь, когда будет актуально.»<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\">Зафиксируйте в CRM причину «не сейчас» и предполагаемое окно решения (после урожая, новый бюджетный год, окончание стройки).<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#F6F3EC; border-radius:10px;\"><span style=\"color:#1B7A4F; font-size:18px; font-weight:800;\">✓<\u002Fspan><p style=\"margin:0;\">Оставьте у клиента ценное: расчёт по объекту, который не устаревает. Это якорь, к которому он вернётся.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.2 — Система догрева (касания)<\u002Fh3>\n      <p style=\"margin:0 0 18px; color:#33343B;\">Догрев — это не «напоминания о себе», а серия полезных касаний, каждое что-то даёт клиенту. Ритм — раз в 3–4 недели.<\u002Fp>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:22%;\">Касание<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Что отправляем<\u002Fth><th style=\"padding:13px 18px; font-weight:700; width:30%;\">Зачем<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">1 — сразу<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Расчёт по объекту + короткое резюме<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Оставить ценность на руках<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">2 — через 3–4 нед.<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Кейс из его отрасли \u002F региона<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Социальное доказательство<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">3<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Новость о росте тарифов \u002F изменении в законе<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Усилить боль фактом, не своими словами<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">4<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Гайд: финансирование \u002F субсидии \u002F лизинг<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Снять барьер капекса<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">5<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Личный вопрос: «как продвигается вопрос с энергией?»<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Проверить готовность, мягко вернуть к решению<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">11.3 — Повторный контакт<\u002Fh3>\n      <p style=\"margin:0 0 14px; color:#33343B;\">Когда наступает зафиксированное окно — возвращаемся не с «ну что, надумали?», а с поводом:<\u002Fp>\n      <div style=\"background:#F6F3EC; border-radius:11px; padding:20px 24px; border-left:3px solid #F7941D; font-style:italic; color:#33343B;\">«[Имя], помните, мы считали станцию для вашего объекта весной? С тех пор тариф для юрлиц подрос, и ваша экономия по новому расчёту стала ещё заметнее. Обновил цифры — переслать? И, если актуально, наметим встречу.»<\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">11.4 — Чего не делать<\u002Fh3>\n      <div style=\"display:grid; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0;\">Не звонить «просто узнать, как дела» без повода — это раздражает.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0;\">Не давить и не упрекать («вы же обещали подумать») — упрёк закрывает дверь.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:16px; padding:14px 20px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-size:18px; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0;\">Не пропадать совсем — молчание полгода = клиент ушёл к тому, кто был на связи.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART XII ============ -->\n    <section id=\"p12\" class=\"bleed page-break keep\" data-screen-label=\"Часть XII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:104px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XII<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть двенадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Работа с эмоциями<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Решение о покупке принимается эмоцией и оправдывается логикой. Менеджер, который слышит эмоцию за словами, ведёт сделку; кто слышит только слова — обрабатывает заявки. Карта эмоций по этапам разговора.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:18%;\">Этап<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Что чувствует \u002F чего боится<\u002Fth><th style=\"padding:13px 18px; font-weight:700; width:36%;\">Что хочет услышать<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Открытие<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Настороженность: «сейчас будут впаривать»<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">«Я не продаю — я считаю и помогаю разобраться»<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Диагностика<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Облегчение, что его слушают<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Вопросы про его ситуацию, а не монолог о панелях<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Цена<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Тревога: «потяну ли, не переплачу ли»<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Окупаемость, лизинг, «актив, а не расход»<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:700;\">Сомнение<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Страх ошибки и плохого подрядчика<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">Гарантии, SLA, кейсы, «скажем честно, если невыгодно»<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:700;\">Решение<\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Боязнь поторопиться<\u002Ftd><td style=\"padding:13px 18px; color:#33343B;\">«Это обратимо, начнём с расчёта\u002Fпилота, без обязательств»<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #D7EADF;\"><div style=\"background:#EEF6F1; padding:14px 20px; display:flex; gap:8px; align-items:center;\"><span style=\"color:#1B7A4F; font-weight:800;\">✓<\u002Fspan><span style=\"font-weight:800; color:#1B7A4F; font-size:13px; letter-spacing:.1em; text-transform:uppercase;\">12.1 — Повышают доверие<\u002Fspan><\u002Fdiv><div style=\"padding:18px 20px; font-size:14px; line-height:1.8; color:#27402F;\">Актив · окупаемость · экономика · расчёт по вашему объекту · гарантия · честно скажем · фиксируем стоимость · без обязательств · единый подрядчик · полный цикл · под вашу задачу.<\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"border-radius:12px; overflow:hidden; border:1px solid #F0DAD3;\"><div style=\"background:#FBEEEB; padding:14px 20px; display:flex; gap:8px; align-items:center;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\u002Fspan><span style=\"font-weight:800; color:#B8412F; font-size:13px; letter-spacing:.1em; text-transform:uppercase;\">12.2 — Снижают доверие<\u002Fspan><\u002Fdiv><div style=\"padding:18px 20px; font-size:14px; line-height:1.8; color:#5E3B34;\">«Дёшево» · «акция» · «успейте» · «всего лишь» · «поверьте мне» · «100% без рисков» · «зелёная энергия для планеты» · «гарантирую прибыль».<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">12.3 — Чего нельзя говорить никогда<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0; font-size:14px;\">Завышенных цифр экономии «чтобы зацепить» — поймают на расчёте.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0; font-size:14px;\">«Все так делают» вместо аргумента — это не довод, а давление.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0; font-size:14px;\">Плохо о конкурентах поимённо — роняет нас, а не их.<\u002Fp><\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px; padding:14px 18px; background:#FBEEEB; border-radius:10px;\"><span style=\"color:#B8412F; font-weight:800;\">✕<\u002Fspan><p style=\"margin:0; font-size:14px;\">«Гарантирую, что окупится за год» — обещание, за которое потом отвечать.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"display:flex; gap:18px; align-items:center; margin-top:20px; padding:22px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\">\n        <div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#F7A93C; font-weight:800; flex:none; writing-mode:vertical-rl; transform:rotate(180deg);\">Цель<\u002Fdiv>\n        <p style=\"margin:0; font-size:16px;\">Клиент должен повесить трубку с чувством «наконец-то кто-то посчитал честно и не давил». Это чувство продаёт сильнее любой цифры — и приводит рекомендации.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART XIII ============ -->\n    <section id=\"p13\" class=\"bleed page-break keep\" data-screen-label=\"Часть XIII\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XIII<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть тринадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Анализ разговора и вероятность сделки<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">После каждого ключевого этапа менеджер выставляет вероятность сделки (лучше — в CRM) и понимает, что делать, если она падает. Это превращает интуицию в управляемый процесс.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:14px;\">13.1 — Контрольные точки и нормативная вероятность<\u002Fh3>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; overflow:hidden;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead><tr style=\"background:#2A2660; color:#fff; text-align:left;\"><th style=\"padding:13px 18px; font-weight:700; width:34%;\">Этап пройден<\u002Fth><th style=\"padding:13px 18px; font-weight:700; width:16%;\">Вероятность<\u002Fth><th style=\"padding:13px 18px; font-weight:700;\">Если ниже — что делать<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Клиент согласился говорить<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#EFE9F3; color:#6A5AA0; font-weight:800; padding:3px 10px; border-radius:6px;\">10–20%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Вернуться к выгоде в первой фразе, не к продукту<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Названа боль в деньгах<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#EFE9F3; color:#6A5AA0; font-weight:800; padding:3px 10px; border-radius:6px;\">25–40%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Углубить Implication-вопросы, нащупать настоящую боль<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Связки попали в боль<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#FBF0DD; color:#B0750C; font-weight:800; padding:3px 10px; border-radius:6px;\">40–55%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Проверить, ту ли боль закрываете; задать тест-вопрос<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Возражения сняты<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#FBF0DD; color:#B0750C; font-weight:800; padding:3px 10px; border-radius:6px;\">55–70%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Не закрыто ключевое возражение — вернуться и разобрать<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2;\"><td style=\"padding:13px 18px; font-weight:600;\">Согласие на расчёт\u002Fвстречу<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#EEF6F1; color:#1B7A4F; font-weight:800; padding:3px 10px; border-radius:6px;\">70–85%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Зафиксировать дату; без даты вероятность падает вдвое<\u002Ftd><\u002Ftr>\n            <tr style=\"border-top:1px solid #EFEBE2; background:#FAF8F3;\"><td style=\"padding:13px 18px; font-weight:600;\">Согласован договор\u002Fфинансирование<\u002Ftd><td style=\"padding:13px 18px;\"><span style=\"background:#EEF6F1; color:#1B7A4F; font-weight:800; padding:3px 10px; border-radius:6px;\">85–95%<\u002Fspan><\u002Ftd><td style=\"padding:13px 18px; color:#5E6066;\">Ускорить документы, держать темп, не «остывать»<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:18px 0 36px;\">\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; padding:22px 24px;\"><h3 style=\"font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#B8412F; font-weight:800; margin-bottom:14px;\">13.2 — Сигналы, что вероятность падает<\u002Fh3><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Клиент перестал задавать вопросы, отвечает односложно — вернитесь к его боли.<\u002Fli><li>«Пришлите на почту» без уточнений — удержите вопросом про цифры объекта.<\u002Fli><li>Появился третий человек «которому надо показать» — выясните DMU, сделайте контакт союзником.<\u002Fli><li>Разговор ушёл в цену до показа ценности — остановитесь, вернитесь к экономике.<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:12px; padding:22px 24px;\"><h3 style=\"font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#1B7A4F; font-weight:800; margin-bottom:14px;\">13.3 — Как поднять падающую вероятность<\u002Fh3><ul style=\"margin:0; padding-left:18px; color:#33343B; font-size:14px; line-height:1.7;\"><li>Прямой вопрос: «что должно произойти, чтобы это стало для вас решённым делом?»<\u002Fli><li>Снизьте порог: не вся станция, а пилот; не покупка, а лизинг; не решение, а расчёт.<\u002Fli><li>Усильте боль фактом извне (рост тарифа, кейс конкурента), а не давлением.<\u002Fli><li>Зафиксируйте микро-договорённость — любой следующий конкретный шаг с датой.<\u002Fli><\u002Ful><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART XIV ============ -->\n    <section id=\"p14\" class=\"bleed page-break keep\" data-screen-label=\"Часть XIV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XIV<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть четырнадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Три версии скрипта<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Один и тот же продукт продаётся разным людям по-разному. Три тональности под три типа собеседника. Менеджер выбирает версию по сегменту и характеру клиента, считанному на диагностике.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 36px; display:grid; gap:16px;\">\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#EFE9F3; padding:18px 26px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px; color:#4A4490;\">14.1 — Экспертная версия<\u002Fdiv><div style=\"font-size:12px; color:#7A76B0; font-weight:700;\">аналитик · финдиректор · техдиректор<\u002Fdiv><\u002Fdiv><p style=\"margin:6px 0 0; font-size:13.5px; color:#6A66A0;\">Сухо, цифрами, без эмоций. Собеседник доверяет данным, а не энтузиазму.<\u002Fp><\u002Fdiv>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Добрый день. Helio Solar KZ. Готов прислать P&amp;L-модель окупаемости станции под ваш фактический счёт — с IRR, NPV и сроком окупаемости. Расчёт бесплатный. Куда удобнее — на почту или WhatsApp?»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«LCOE проекта — порядка 17 тенге за кВт·ч против сетевых 49. На горизонте 25 лет это NPV в плюс и IRR около 22%. Это инвестиционное решение, а не покупка оборудования.»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Подготовлю модель под ваши цифры. Когда удобно разобрать её — вторник или среда?»<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#EEF6F1; padding:18px 26px;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px; color:#1B7A4F;\">14.2 — Дружелюбная версия<\u002Fdiv><div style=\"font-size:12px; color:#3E8C66; font-weight:700;\">частник · малый бизнес<\u002Fdiv><\u002Fdiv><p style=\"margin:6px 0 0; font-size:13.5px; color:#3E8C66;\">Тепло, на бытовом языке, через семью и спокойствие. Никаких «инверторов» и «IRR».<\u002Fp><\u002Fdiv>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Здравствуйте! Спасибо, что оставили заявку. Я не буду грузить техникой — давайте просто посмотрим, сколько вы платите за свет и сколько могли бы. Это пять минут и ни к чему не обязывает, хорошо?»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Представьте: зимой у соседей свет отключили, а у вас тёплый пол и кофе как ни в чём не бывало. И счёт при этом не растёт — он зафиксирован на годы вперёд. Дом потихоньку начинает работать на вас.»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Давайте наш инженер посчитает именно по вашему дому — бесплатно. Завтра днём или вечером удобнее обсудить?»<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"border:2px solid #2A2660; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:linear-gradient(120deg,#2E2A66,#3A3680); padding:18px 26px; color:#fff;\"><div style=\"display:flex; justify-content:space-between; align-items:baseline;\"><div style=\"font-weight:800; font-size:18px;\">14.3 — Премиальная версия<\u002Fdiv><div style=\"font-size:12px; color:#BDB9DC; font-weight:700;\">собственник · крупный B2B · C-level<\u002Fdiv><\u002Fdiv><p style=\"margin:6px 0 0; font-size:13.5px; color:#CFCCE6;\">Уверенно, масштабно, на равных. О стратегии и горизонте, а не о цене за киловатт.<\u002Fp><\u002Fdiv>\n        <div style=\"padding:22px 26px; display:grid; gap:14px;\">\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Открытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Добрый день. Мы не продаём панели — мы создаём для предприятий собственный источник дешёвой энергии на 25–30 лет. После расчёта руководители видят, сколько миллионов в год можно оставлять внутри компании. Найдётся 20 минут — покажу на ваших цифрах.»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Аргумент<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Это вопрос энергетической стратегии на десятилетие: фиксируете себестоимость энергии, получаете ESG-соответствие для партнёров и банков, опережаете отрасль. Экономика лучше депозита и работает каждый день.»<\u002Fp><\u002Fdiv>\n          <div><div style=\"font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A9488; font-weight:800; margin-bottom:6px;\">Закрытие<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Предлагаю короткую встречу с расчётом под ваш объект. Вам удобнее у вас или у нас, в начале или в конце недели?»<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART XV ============ -->\n    <section id=\"p15\" class=\"bleed page-break keep\" data-screen-label=\"Часть XV\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XV<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть пятнадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Готовые скрипты<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Полные сценарии для повседневной работы — обработка входящего лида и холодный B2B-аутрич. Готово к применению дословно или с подстройкой под клиента.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:6px;\">15.1 — Обработка входящего лида<\u002Fh3>\n      <p style=\"margin:0 0 22px; color:#33343B;\">Цель: не продать станцию по телефону, а понять задачу, вызвать доверие, квалифицировать лид и договориться о расчёте под объект.<\u002Fp>\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">1<\u002Fspan><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Первые 30 секунд<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Здравствуйте, [Имя]! Меня зовут ___, компания Helio Solar KZ. Спасибо, что оставили заявку. Удобно уделить мне 5 минут? Я сначала пойму вашу задачу, чтобы не предлагать шаблон — а под неё мы сделаем расчёт именно по вашему объекту.»<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">2<\u002Fspan><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Выявляем настоящую потребность<\u002Fdiv><p style=\"margin:0 0 8px; color:#33343B;\">«Подскажите, что подтолкнуло оставить заявку именно сейчас — хотите снизить счёт за электричество, часто отключают свет, строите объект или думаете про выгодную инвестицию?»<\u002Fp><p style=\"margin:0; font-size:13px; color:#9A8B6E; font-style:italic;\">→ Внимательно выслушать, не перебивать. Настоящая причина определит всю линию.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">3<\u002Fspan><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Изучаем объект<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Расскажите немного об объекте: где находится, что это — предприятие, склад, магазин, дом? В собственности? Какой примерно счёт в месяц? Свет нужен в основном днём или круглосуточно?»<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">4<\u002Fspan><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Показываем экспертность<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Спасибо, уже по ответам видно, что можно сделать хороший расчёт. Мы не предлагаем шаблон — сначала считаем, насколько проект выгоден именно вам: экономия, срок окупаемости и какое решение подойдёт лучше всего.»<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">5<\u002Fspan><div style=\"background:#F6F3EC; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px;\">Квалификация (для бизнеса)<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Ещё один вопрос: кто обычно принимает окончательное решение по таким проектам — вы, собственник или руководитель?»<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"keep\" style=\"display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:start;\"><span style=\"flex:none; width:30px; height:30px; border-radius:50%; background:#2A2660; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;\">6<\u002Fspan><div style=\"background:#F2F1FA; border-radius:11px; padding:16px 20px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:6px; color:#2A2660;\">Закрытие на следующий шаг<\u002Fdiv><p style=\"margin:0; color:#33343B;\">«Следующий этап простой: инженер готовит персональный расчёт — мощность, ориентировочную стоимость, прогноз экономии, окупаемость и финансирование. Потом спокойно обсудим. Когда удобнее — завтра после обеда или в первой половине дня?»<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;\">\n        <div style=\"border:1px dashed #D8CFBE; border-radius:10px; padding:14px 18px;\"><div style=\"font-size:12px; font-weight:800; color:#D87D08; margin-bottom:5px;\">Если спрашивают цену<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">«Стоимость зависит от мощности, объекта и оборудования — поэтому сначала считаем, чтобы назвать точную цифру и сразу показать выгоду, а не пугать средней по рынку.»<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px dashed #D8CFBE; border-radius:10px; padding:14px 18px;\"><div style=\"font-size:12px; font-weight:800; color:#D87D08; margin-bottom:5px;\">Если «просто интересуюсь»<\u002Fdiv><p style=\"margin:0; font-size:13.5px; color:#5E6066;\">«Это нормально — для того и нужен бесплатный расчёт. Получите реальные цифры по своему объекту и решите без всяких обязательств.»<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"margin-top:16px; padding:20px 26px; background:linear-gradient(120deg,#2E2A66,#3A3680); border-radius:12px; color:#fff;\"><div style=\"font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#F7A93C; font-weight:800; margin-bottom:6px;\">Фраза-стандарт компании<\u002Fdiv><p style=\"margin:0; font-size:16px; font-weight:600;\">«Наша задача — не продать вам станцию, а понять, принесёт ли она вашему объекту реальную выгоду. Если расчёт покажет, что сейчас нецелесообразно, мы честно об этом скажем.»<\u002Fp><\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:24px 0 36px;\">\n      <h3 style=\"font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#D87D08; font-weight:800; margin-bottom:18px;\">15.2 — B2B-аутрич: холодные касания<\u002Fh3>\n      <div style=\"display:grid; gap:12px;\">\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Зацепка для директора предприятия (звонок)<\u002Fdiv><p style=\"margin:0; color:#33343B; font-style:italic;\">«Добрый день! ___, Helio Solar KZ. Мы помогаем предприятиям снижать расходы на электроэнергию до 70% за счёт собственной генерации — без остановки производства. Подскажите, кто у вас отвечает за затраты на энергоресурсы и инвестиционные проекты?»<\u002Fp><\u002Fdiv>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Через инвестиционную логику<\u002Fdiv><p style=\"margin:0; color:#33343B; font-style:italic;\">«Многие считают станцию расходом. На деле это актив, который начинает экономить с первого дня после запуска и работает больше 25 лет. Поэтому предприятия и переходят на собственную генерацию уже сейчас, пока тариф не вырос ещё.»<\u002Fp><\u002Fdiv>\n        <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:11px; padding:18px 22px;\"><div style=\"font-weight:800; font-size:14px; margin-bottom:8px;\">Закрытие на встречу<\u002Fdiv><p style=\"margin:0; color:#33343B; font-style:italic;\">«Не предлагаю решать сейчас. Предлагаю короткую встречу на 20–30 минут — покажем реализованные проекты, расчёт окупаемости и варианты финансирования через лизинг. После этого спокойно оцените, есть ли выгода для вашей компании.»<\u002Fp><\u002Fdiv>\n        <div class=\"keep\" style=\"border:1px solid #D8E4DD; border-radius:11px; overflow:hidden;\"><div style=\"background:#E7F0EA; padding:12px 22px; display:flex; align-items:center; gap:10px;\"><span style=\"width:24px; height:24px; border-radius:6px; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;\">W<\u002Fspan><span style=\"font-weight:800; font-size:14px; color:#1B7A4F;\">WhatsApp после звонка<\u002Fspan><\u002Fdiv><div style=\"padding:18px 22px; color:#33343B;\"><p style=\"margin:0 0 10px;\">Добрый день! Как договаривались, коротко о Helio Solar KZ — реализуем промышленные солнечные станции полного цикла (EPC) для предприятий Казахстана и Центральной Азии.<\u002Fp><ul style=\"margin:0 0 10px; padding-left:18px; line-height:1.7; font-size:14px;\"><li>Снижение расходов на электроэнергию до 70%<\u002Fli><li>Проекты от 50 кВт до сотен мегаватт<\u002Fli><li>Финансирование через лизинг (для производства — ставка от 12,6%)<\u002Fli><li>Проектирование, поставка, монтаж и сервис — в одних руках<\u002Fli><\u002Ful><p style=\"margin:0;\">Подготовлю предварительный расчёт по вашему предприятию. Сбросите последний счёт за электричество и примерную площадь крыши?<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"keep\" style=\"margin-top:16px; padding:20px 26px; background:#FBF4E9; border-radius:12px; border-left:4px solid #F7941D;\"><div style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#B0750C; font-weight:800; margin-bottom:6px;\">Главный принцип отдела продаж<\u002Fdiv><p style=\"margin:0; font-size:16px; font-weight:600; color:#3A3010;\">Мы не продаём панели. Мы помогаем снижать расходы на электроэнергию, повышать прибыль и принимать выгодные инвестиционные решения.<\u002Fp><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART XVI ============ -->\n    <section id=\"p16\" class=\"bleed page-break keep\" data-screen-label=\"Часть XVI\" style=\"position:relative; overflow:hidden; background:#26235C; background-image:linear-gradient(135deg,#2E2A66,#211E50); color:#fff; padding:54px 72px;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-90px; top:-90px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(247,148,29,.30),rgba(247,148,29,0) 65%);\"><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:30px;\">\n        <div style=\"font-size:88px; line-height:.8; font-weight:800; color:#F7941D; letter-spacing:-.04em;\">XVI<\u002Fdiv>\n        <div style=\"border-left:1px solid rgba(255,255,255,.2); padding-left:30px;\">\n          <div style=\"font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#A7A3D0; font-weight:800; margin-bottom:8px;\">Часть шестнадцатая<\u002Fdiv>\n          <h2 style=\"font-size:34px; font-weight:800; letter-spacing:-.01em; line-height:1.08;\">Десять смоделированных диалогов<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin:26px 0 0; max-width:700px; font-size:16px; line-height:1.55; color:#D7D5EC;\">Скрипт оживает только в диалоге. Десять разговоров под типовые ситуации. <b style=\"color:#F7A93C;\">М<\u002Fb> — менеджер, <b style=\"color:#fff;\">К<\u002Fb> — клиент, стрелкой отмечен разбор приёма.<\u002Fp>\n    <\u002Fsection>\n\n    <section style=\"padding:42px 0 18px; display:grid; gap:22px;\">\n      <!-- D1 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 1 · Идеальный разговор<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">коммерция<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Добрый день, Арман! Helio Solar KZ. Спасибо за заявку. Пять минут найдётся? Я сначала пойму задачу, потом посчитаем по вашему объекту.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Да, давайте. У меня склад, счёт за свет уже под два миллиона в месяц, дорого.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Два миллиона — серьёзно. А за последние пару лет насколько вырос?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Процентов на тридцать, наверное. И конца не видно.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот это как раз и фиксируется. Крыша большая, нагрузка дневная — почти идеальный случай. Станция превращает крышу в актив с окупаемостью 2–3 года, дальше 20 лет вы платите за свет в разы меньше. Капекс вынимать не нужно — лизинг, платёж идёт из самой экономии.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">А если посчитать конкретно по мне?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Для этого и звоню. Пришлёте последний счёт и площадь крыши — инженер сделает расчёт с окупаемостью и финмоделью. Обсудим в четверг или в пятницу?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Давайте в четверг.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Боль названа в деньгах, ценность привязана к ней, капекс снят лизингом, закрытие альтернативное. <b style=\"color:#2A2660;\">Вероятность ~80%.<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D2 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 2 · Трудный клиент<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">всё подвергает сомнению<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Знаю я эти ваши панели, окупаемость рисуете красивую, а на деле обман.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Понимаю скепсис — обещаний на рынке много. Поэтому я ничего не рисую: дам расчёт по вашим цифрам и помесячную выработку с реального объекта в вашем регионе. Если по факту невыгодно — скажу прямо.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ну-ну. И зимой ваши панели не работают.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Зимой выработка ниже — это правда. Поэтому схема гибридная с НЕТТО: летом копите переработку в сеть, зимой снимаете. Покажу годовой баланс на объекте, который уже отработал зиму. Цифры вас и рассудят.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ладно, покажите свой расчёт. Только без сказок.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Без сказок — это мой формат. Сбросьте счёт и площадь, пришлю расчёт и тот самый годовой график.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Скепсис не оспаривается, а признаётся; ответ — факты и проверяемые документы. Reverse-close «скажу прямо» снимает оборону.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D3 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 3 · Агрессивный клиент<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">раздражён<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Сколько можно звонить?! Достали уже своими станциями!<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Извините за беспокойство, не хотел попасть не вовремя. Один вопрос и отпущу: вам вообще тема снижения счёта за электричество интересна или закрыть вопрос совсем?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Да некогда мне, у меня производство стоит из-за отключения!<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот как раз про это и могу быть полезен — отключения и есть то, что станция с резервом убирает. Давайте не буду грузить сейчас, скину короткое сообщение, посмотрите в спокойную минуту. Идёт?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Ну скиньте, потом гляну.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> На агрессию — спокойствие и уважение к «некогда». Зацепка за реальную боль (простой из-за отключения), мягкий перенос в асинхрон.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D4 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 4 · Сомневающийся клиент<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">боится прогадать<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вроде интересно, но боюсь прогадать. Вдруг не окупится.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Нормальный страх, решение не на один год. Давайте уберём гадание: сделаем расчёт по вашему фактическому счёту, с консервативным сценарием выработки. Увидите цифры — и решение будет на данных, а не на ощущениях.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">А если тариф вдруг упадёт и экономия пропадёт?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">За последние годы тариф только рос, особенно для юрлиц. Но в расчёте заложу даже сценарий без роста — и там окупаемость всё равно остаётся. Если хотите, начнём с пилота, чтобы посмотреть факт.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Пилот — это уже спокойнее звучит.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Сомнение снимается данными и снижением риска (консервативный сценарий + пилот). Клиент сам выбирает менее рискованный вход.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D5 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 5 · Сравнивает с конкурентами<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">«дешевле у других»<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Мне другая компания насчитала дешевле на пару миллионов.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Возможно. Давайте сравним не цену установки, а стоимость киловатт-часа за 25 лет и гарантии. Дешёвая станция со слабым оборудованием и без сервиса часто выходит дороже — из-за недовыработки и простоев. Какое оборудование и какую гарантию они закладывают?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Честно, не уточнял.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Вот в этом и суть. Пришлю сравнение по LCOE и гарантийным обязательствам — без имён, просто параметры. Сопоставите по-честному и увидите реальную картину на горизонте, а не только цену на старте.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Не очерняем конкурента, переводим сравнение с цены установки на стоимость владения за 25 лет — поле, где мы сильнее.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:0 0 36px; display:grid; gap:22px;\">\n      <!-- D6 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 6 · Без бюджета на старте<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">нет свободных денег<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Тема хорошая, но свободных денег сейчас нет.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Их и не нужно вынимать. Берём в лизинг: аванс от 15%, а ежемесячный платёж перекрывается экономией с первого месяца. Для производства ставка от 12,6%. По сути вы меняете растущий платёж энергосбыту на фиксированный за свой актив.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">То есть из своего кармана почти не плачу?<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-start;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#F7941D; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">М<\u002Fspan><div style=\"background:#FBF4E9; border-radius:4px 14px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Грубо так: экономия гасит платёж. Давайте подам заявку на расчёт лизинга параллельно с проектом — увидите цифры платежа и экономии рядом.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F2F1FA; padding:14px 24px; font-size:13px; color:#4A4677; border-top:1px solid #E5E1EE;\"><b>→ Разбор.<\u002Fb> Главное B2B-возражение снимается финансированием. Перевод капекса в опекс — ядро аргумента.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- D7 -->\n      <div class=\"keep\" style=\"border:1px solid #E7E2D7; border-radius:14px; overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:#F6F3EC;\"><span style=\"font-weight:800; font-size:15px;\">Диалог 7 · «Я подумаю»<\u002Fspan><span style=\"font-size:12px; color:#9A9488; font-weight:700;\">скрытое сомнение<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:22px 24px; display:flex; flex-direction:column; gap:12px;\">\n          <div style=\"display:flex; gap:10px; max-width:84%; align-self:flex-end; flex-direction:row-reverse;\"><span style=\"flex:none; width:28px; height:28px; border-radius:50%; background:#9A9488; color:#fff; font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;\">К<\u002Fspan><div style=\"background:#F1EFEA; border-radius:14px 4px 14px 14px; padding:11px 16px; font-size:14px; color:#33343B;\">Спасибо, мне надо подумать.<\u002Fdiv><\u00
